    <div class="toast-stack" id="toastStack"></div>

<script>
    /* ============================= THEME (dark / light) ============================= */
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        const btn = document.getElementById('themeToggleBtn');
        if (btn) btn.innerHTML = theme === 'light' ? '☀️ Light' : '🌙 Dark';
        if (typeof plotterDraw === 'function' && typeof PLT !== 'undefined' && PLT.open) { PLT.dirty = true; }
    }
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        localStorage.setItem('candb-theme', next);
        applyTheme(next);
    }
    applyTheme(localStorage.getItem('candb-theme') || 'dark');

    /* =========================================================================
       APPLICATION STATE
       db.nodes: string[]
       db.nodeComments: { [nodeName]: string }
       db.messages: [{
         id, rawId, isExt, name, dlc, node, comment, attrs: {name: value},
         signals: [{
           name, start, len, order('0'|'1'), type('+'|'-'), factor, offset, min, max, unit,
           comment, muxType('none'|'M'|'m'), muxValue(int|null), receivers: string[], valTable: {}
         }]
       }]
       db.valueTablesRaw: string[]   -- passthrough VAL_TABLE_ lines, preserved verbatim on export
       parseIssues: [{severity, message, line}]  -- syntax problems found while parsing raw text
    ========================================================================= */
    let db = { version: "", nodes: [], nodeComments: {}, messages: [], valueTablesRaw: [], attrDefs: {}, netAttrs: {}, nodeAttrs: {}, attrRaw: [] };
    let parseIssues = [];

    /* ---- Multi-database registry -------------------------------------------------
       Many DBC files can be loaded at once (dbFiles). Exactly one is "active":
       the global `db` always points at the active entry's object, so the whole
       Database view (tree, editors, validation, export) works on it unchanged.
       The Trace tool and Plotter decode against ALL loaded files, active first. */
    let dbFiles = [];        // [{ name, db, parseIssues }]
    let activeDbIndex = -1;
    let suppressParseToasts = false;

    function allDbEntries() {
        return dbFiles.length ? dbFiles : [{ name: loadedFileName || 'Untitled database', db: db, parseIssues: parseIssues }];
    }

    function registerCurrentDb(name) {
        dbFiles.push({ name: name, db: db, parseIssues: parseIssues });
        activeDbIndex = dbFiles.length - 1;
        renderDbSelector();
    }

    function renderDbSelector() {
        const sel = document.getElementById('dbFileSel');
        if (!sel) return;
        if (dbFiles.length === 0) { sel.innerHTML = '<option>No database loaded</option>'; return; }
        sel.innerHTML = dbFiles.map((e, i) =>
            `<option value="${i}" ${i === activeDbIndex ? 'selected' : ''}>${escapeHtml(e.name)} (${e.db.messages.filter(m => !m.isIndependent).length} msgs)</option>`
        ).join('');
    }

    function switchActiveDb(idx) {
        if (idx < 0 || idx >= dbFiles.length) return;
        activeDbIndex = idx;
        const e = dbFiles[idx];
        db = e.db;
        parseIssues = e.parseIssues;
        loadedFileName = e.name;
        document.getElementById('fileBadge').innerText = e.name;
        activeType = null; activeMsgIndex = null; activeSigIndex = null; activeNodeName = null;
        renderTree();
        showEmptyState();
        runValidation();
        renderDbSelector();
        if (typeof TR !== 'undefined' && TR.built) traceRebuildDbMaps();
    }

    // Returns the app to the same generic home state shown on first open:
    // no databases loaded, empty explorer, empty editor, zero problems.
    function resetToHomeState() {
        db = { version: "", nodes: [], nodeComments: {}, messages: [], valueTablesRaw: [], attrDefs: {}, netAttrs: {}, nodeAttrs: {}, attrRaw: [] };
        parseIssues = [];
        dbFiles = [];
        activeDbIndex = -1;
        loadedFileName = null;
        activeType = null; activeMsgIndex = null; activeSigIndex = null; activeNodeName = null;
        document.getElementById('fileBadge').innerText = 'No file loaded';
        renderTree();
        showEmptyState();
        runValidation();
        renderDbSelector();
        if (typeof TR !== 'undefined' && TR.built) traceRebuildDbMaps();
    }

    function closeActiveDb() {
        if (dbFiles.length === 0) return;
        const name = dbFiles[activeDbIndex].name;
        confirmDialog('Close Database', `Close <b>${escapeHtml(name)}</b>? Unsaved changes to it will be lost. Other loaded databases stay open.`, () => {
            dbFiles.splice(activeDbIndex, 1);
            if (dbFiles.length === 0) { resetToHomeState(); }
            else { switchActiveDb(Math.max(0, activeDbIndex - 1)); }
            showToast(`Closed ${name}.`, 'success');
        }, 'Close');
    }
    let activeType = null;
    let activeMsgIndex = null;
    let activeSigIndex = null;
    let activeNodeName = null;
    let loadedFileName = null;

    const sigColors = ['#ef4444', '#f97316', '#eab308', '#84cc16', '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e', '#78716c'];
    const IDENT_RE = /^[a-zA-Z_][a-zA-Z0-9_]*$/;

    // DBC byte-order convention: '1' = Intel / little-endian (start bit is the LSB, bits count UP).
    // '0' = Motorola / big-endian (start bit is the MSB, bits zig-zag through the DBC bit-numbering scheme).
    // Returns the bit indices in traversal order, first-to-last (first = start bit).
    function computeSignalBits(sig) {
        const bits = [];
        if (sig.order === '1') {
            for (let i = 0; i < sig.len; i++) bits.push(sig.start + i);
        } else {
            let curr = sig.start;
            for (let i = 0; i < sig.len; i++) {
                bits.push(curr);
                if (curr % 8 === 0) curr += 15; else curr -= 1;
            }
        }
        return bits;
    }

    function isIndependentMsg(msg) { return !!(msg && msg.isIndependent); }

    // Resolves a raw DBC message id (as written in VAL_/CM_/BA_ lines) to a message object.
    // Vector's independent-signal container uses the reserved raw id 0xC0000000 (3221225472),
    // which would otherwise mask down to 0 and collide with a legitimate message id 0.
    function findMsgByRawId(rawIdStr) {
        const raw = parseInt(rawIdStr, 10) >>> 0;
        if (raw === 0xC0000000) return db.messages.find(m => m.isIndependent);
        const masked = raw & 0x1FFFFFFF;
        return db.messages.find(m => !m.isIndependent && m.id === masked);
    }

    function msgExportId(msg) {
        if (msg.isIndependent) return '3221225472'; // Vector's reserved VECTOR__INDEPENDENT_SIG_MSG sentinel ID
        let exportId = msg.id;
        if (msg.isExt) exportId = exportId | 0x80000000;
        return (exportId >>> 0).toString(10);
    }


    const reMsg = /^BO_\s+(\d+)\s+([^:]+?)\s*:\s*(\d+)\s+(\S+)/;
    const reSig = /^\s*SG_\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*(m\d+|M)?\s*:\s*(\d+)\s*\|\s*(\d+)\s*@\s*([01])\s*([+-])\s*\(\s*([^,]+)\s*,\s*([^)]+)\s*\)\s*\[\s*([^|]*)\s*\|\s*([^\]]*)\s*\]\s*"([^"]*)"\s*(.*)$/;
    const reVal = /^VAL_\s+(\d+)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s+(.*);/;
    const reValTable = /^VAL_TABLE_\s+/;
    const reCmBU = /CM_\s+BU_\s+([a-zA-Z_][a-zA-Z0-9_]*)\s+"([\s\S]*?)"\s*;/g;
    const reCmBO = /CM_\s+BO_\s+(\d+)\s+"([\s\S]*?)"\s*;/g;
    const reCmSG = /CM_\s+SG_\s+(\d+)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s+"([\s\S]*?)"\s*;/g;

    /* ============================= ATTRIBUTE ENGINE =============================
       Generic user-defined attribute machinery, mirroring Vector CANdb++:
         BA_DEF_      attribute definition (object type + value type + constraints)
         BA_DEF_DEF_  attribute default value
         BA_          attribute value assignment to network / node / message / signal

       Definition model (db.attrDefs[name]):
         { name, objectType: '' (network) | 'BU_' | 'BO_' | 'SG_',
           valueType: 'INT' | 'HEX' | 'FLOAT' | 'STRING' | 'ENUM',
           min, max,            // numeric types; min === max means "unrestricted"
           enumValues: [],      // ENUM only; BA_ stores the INDEX into this list
           defaultValue }       // number (index for ENUM), or string for STRING

       Assignments: db.netAttrs[name], db.nodeAttrs[node][name],
                    msg.attrs[name], sig.attrs[name]. A missing key means the
                    default applies (Vector's "value = default" display state).   */

    // BA_DEF_ [BU_|BO_|SG_|EV_] "Name" TYPE constraints ;
    const reAttrDef = /^BA_DEF_\s+(?:(BU_|BO_|SG_|EV_)\s+)?"([^"]+)"\s+(INT|HEX|FLOAT|STRING|ENUM)\s*([^;]*);/;
    // BA_DEF_DEF_ "Name" value ;
    const reAttrDefDef = /^BA_DEF_DEF_\s+"([^"]+)"\s+([^;]*);/;
    // BA_ "Name" [BU_ node | BO_ id | SG_ id signame] value ;
    const reAttrAssign = /^BA_\s+"([^"]+)"\s+(?:BU_\s+([a-zA-Z_][a-zA-Z0-9_]*)\s+|BO_\s+(\d+)\s+|SG_\s+(\d+)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s+)?([^;]*);/;

    // The five standard Vector "Gen*" attributes, pre-seeded so every database
    // can use them out of the box. Send-type enum lists use the common Vector
    // defaults; BA_ stores ENUM values as an index into this exact ordering.
    const SEND_TYPE_ENUM_MSG = ["Cyclic", "OnWrite", "OnWriteWithRepetition", "OnChange", "OnChangeWithRepetition", "IfActive", "IfActiveWithRepetition", "NoMsgSendType"];
    const SEND_TYPE_ENUM_SIG = ["Cyclic", "OnWrite", "OnWriteWithRepetition", "OnChange", "OnChangeWithRepetition", "IfActive", "IfActiveWithRepetition", "NoSigSendType"];

    function standardAttrDefs() {
        return {
            'GenMsgCycleTime':     { name: 'GenMsgCycleTime',     objectType: 'BO_', valueType: 'INT',   min: 0, max: 65535, enumValues: [], defaultValue: 0 },
            'GenMsgSendType':      { name: 'GenMsgSendType',      objectType: 'BO_', valueType: 'ENUM',  min: 0, max: 0, enumValues: SEND_TYPE_ENUM_MSG.slice(), defaultValue: 7 },
            'GenSigSendType':      { name: 'GenSigSendType',      objectType: 'SG_', valueType: 'ENUM',  min: 0, max: 0, enumValues: SEND_TYPE_ENUM_SIG.slice(), defaultValue: 7 },
            'GenSigStartValue':    { name: 'GenSigStartValue',    objectType: 'SG_', valueType: 'FLOAT', min: 0, max: 0, enumValues: [], defaultValue: 0 },
            'GenSigInactiveValue': { name: 'GenSigInactiveValue', objectType: 'SG_', valueType: 'INT',   min: 0, max: 0, enumValues: [], defaultValue: 0 }
        };
    }

    // Add any of the five standard definitions that the database doesn't already
    // have. Existing definitions from a loaded file always win (their enum
    // ordering may be OEM-specific and BA_ indices depend on it).
    function seedStandardAttrs() {
        const std = standardAttrDefs();
        Object.keys(std).forEach(name => { if (!db.attrDefs[name]) db.attrDefs[name] = std[name]; });
    }

    // Parses a raw BA_/BA_DEF_DEF_ value token according to the definition's type.
    // Returns the internal representation (number, ENUM index, or string), or
    // null if the token can't be interpreted.
    function parseAttrValue(def, raw) {
        raw = (raw || '').trim();
        const quoted = raw.match(/^"([\s\S]*)"$/);
        if (def.valueType === 'STRING') return quoted ? quoted[1] : raw;
        if (def.valueType === 'ENUM') {
            if (quoted) {
                const idx = def.enumValues.indexOf(quoted[1]);
                return idx >= 0 ? idx : null;
            }
            const n = parseInt(raw, 10);
            return Number.isFinite(n) ? n : null;
        }
        // INT / HEX / FLOAT
        const v = quoted ? parseFloat(quoted[1]) : parseFloat(raw);
        return Number.isFinite(v) ? v : null;
    }

    // Formats an internal attribute value for display in the UI.
    function displayAttrValue(def, value) {
        if (value === undefined || value === null) return '';
        if (def.valueType === 'ENUM') return def.enumValues[value] !== undefined ? def.enumValues[value] : `#${value}`;
        return String(value);
    }

    // Formats an internal value for DBC export. ENUM assignments are written as
    // indices (Vector convention); ENUM defaults are written as quoted strings.
    function exportAttrValue(def, value, isDefaultLine) {
        if (def.valueType === 'STRING') return `"${String(value).replace(/"/g, "'")}"`;
        if (def.valueType === 'ENUM') {
            if (isDefaultLine) return `"${def.enumValues[value] !== undefined ? def.enumValues[value] : ''}"`;
            return String(value);
        }
        return String(value);
    }

    // Effective value of an attribute on an object: explicit assignment if
    // present, otherwise the definition's default.
    function effectiveAttr(attrsObj, defName) {
        const def = db.attrDefs[defName];
        if (!def) return undefined;
        if (attrsObj && attrsObj[defName] !== undefined) return attrsObj[defName];
        return def.defaultValue;
    }

    // Assignment container for the currently edited object, by object type.
    function attrsContainerFor(objType) {
        if (objType === 'BU_') {
            if (!db.nodeAttrs[activeNodeName]) db.nodeAttrs[activeNodeName] = {};
            return db.nodeAttrs[activeNodeName];
        }
        if (objType === 'BO_') return db.messages[activeMsgIndex].attrs;
        if (objType === 'SG_') return db.messages[activeMsgIndex].signals[activeSigIndex].attrs;
        return db.netAttrs;
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        e.target.value = '';
        if (files.length === 0) return;
        suppressParseToasts = files.length > 1;
        let idx = 0, loaded = 0, totalErrs = 0;
        (function loadNext() {
            if (idx >= files.length) {
                suppressParseToasts = false;
                renderDbSelector();
                if (typeof TR !== 'undefined' && TR.built) traceRebuildDbMaps();
                if (files.length > 1) {
                    showToast(`Loaded ${loaded} database file(s)${totalErrs ? ` — ${totalErrs} syntax error(s), see Problems` : ''}.`, totalErrs ? 'warning' : 'success');
                }
                return;
            }
            const file = files[idx++];
            const reader = new FileReader();
            reader.onload = function(ev) {
                loadedFileName = file.name;
                parseDbc(ev.target.result);          // sets the globals db / parseIssues
                registerCurrentDb(file.name);        // snapshot them into the registry
                loaded++;
                totalErrs += parseIssues.filter(p => p.severity === 'error').length;
                loadNext();
            };
            reader.onerror = function() { showToast(`Could not read ${file.name} from disk.`, 'error'); loadNext(); };
            reader.readAsText(file);
        })();
    });

    /* ============================= TOASTS ============================= */
    function showToast(msg, type) {
        const stack = document.getElementById('toastStack');
        const t = document.createElement('div');
        t.className = 'toast ' + (type || '');
        t.innerText = msg;
        stack.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3200);
    }

    /* ============================= MODAL SYSTEM ============================= */
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    function openModal(title, bodyHtml, buttons, wide) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = bodyHtml;
        document.querySelector('.modal-box').classList.toggle('wide', !!wide);
        const footer = document.getElementById('modalFooter');
        footer.innerHTML = '';
        buttons.forEach(b => {
            const btn = document.createElement('button');
            btn.className = 'modal-btn' + (b.variant ? ' ' + b.variant : '');
            btn.innerText = b.label;
            btn.onclick = b.onClick;
            footer.appendChild(btn);
        });
        document.getElementById('modalOverlay').classList.add('open');
    }

    function confirmDialog(title, message, onConfirm, confirmLabel) {
        openModal(title, `<p>${message}</p>`, [
            { label: 'Cancel', onClick: closeModal },
            { label: confirmLabel || 'Confirm', variant: 'danger', onClick: () => { closeModal(); onConfirm(); } }
        ]);
    }

    function promptDialog(title, label, defaultValue, onSubmit) {
        openModal(title, `<label style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;font-weight:600;">${label}</label>
            <input type="text" id="modalInput" value="${defaultValue || ''}">
            <div class="modal-error-text" id="modalErr"></div>`,
            [
                { label: 'Cancel', onClick: closeModal },
                { label: 'OK', variant: 'primary', onClick: () => {
                    const val = document.getElementById('modalInput').value.trim();
                    const err = onSubmit(val);
                    if (err) { document.getElementById('modalErr').innerText = err; }
                    else { closeModal(); }
                } }
            ]);
        setTimeout(() => { const el = document.getElementById('modalInput'); if (el) { el.focus(); el.select(); } }, 50);
    }

    /* ============================= NEW / OPEN ============================= */
    function promptNewDatabase() {
        if (db.messages.length > 0 || db.nodes.length > 0) {
            confirmDialog('New Database', 'This will discard the current database. Continue?', createNewDatabase, 'Discard & Create');
        } else {
            createNewDatabase();
        }
    }

    function createNewDatabase() {
        db = { version: "1.0", nodes: ["Vector__XXX"], nodeComments: {}, messages: [], valueTablesRaw: [], attrDefs: {}, netAttrs: {}, nodeAttrs: {}, attrRaw: [] };
        seedStandardAttrs();
        parseIssues = [];
        loadedFileName = 'Untitled database';
        document.getElementById('fileBadge').innerText = 'Untitled database';
        activeType = null; activeMsgIndex = null; activeSigIndex = null; activeNodeName = null;
        registerCurrentDb('Untitled database');
        renderTree();
        showEmptyState();
        runValidation();
        if (typeof TR !== 'undefined' && TR.built) traceRebuildDbMaps();
        showToast('New database created.', 'success');
    }

    /* ============================= DBC PARSER ============================= */
    function parseDbc(text) {
        db = { version: "", nodes: [], nodeComments: {}, messages: [], valueTablesRaw: [], attrDefs: {}, netAttrs: {}, nodeAttrs: {}, attrRaw: [] };
        parseIssues = [];
        let currentMsg = null;
        const pendingAttrAssigns = []; // BA_ lines seen before all defs are known
        const lines = text.split('\n');

        let inNsBlock = false; // inside the NS_ header keyword list

        for (let i = 0; i < lines.length; i++) {
            const rawLine = lines[i];
            const line = rawLine.trim();
            if (line === '' || line.startsWith('//')) continue;

            // The NS_ header block at the top of every DBC is a list of bare
            // section KEYWORDS (one per line: NS_DESC_, CM_, BA_DEF_, VAL_,
            // SG_MUL_VAL_, FILTER, ...). They are not statements and must be
            // skipped — otherwise lines like "BA_DEF_" or "SG_MUL_VAL_" would
            // be misread as malformed attribute/signal definitions.
            if (/^NS_\s*:/.test(line)) { inNsBlock = true; continue; }
            if (inNsBlock) {
                if (/^[A-Z_]+$/.test(line)) continue; // bare keyword -> skip
                inNsBlock = false;                    // first real statement ends the block
            }

            if (line.startsWith('VERSION')) {
                const m = line.match(/VERSION\s+"([^"]*)"/);
                if (m) db.version = m[1];
                continue;
            }

            if (line.startsWith('BU_:')) {
                db.nodes = line.replace('BU_:', '').trim().split(/\s+/).filter(n => n !== '');
                continue;
            }

            // Relation attributes (node-message / node-signal) are not editable in
            // the GUI yet — preserve them verbatim so they round-trip unchanged.
            if (line.startsWith('BA_DEF_DEF_REL_') || line.startsWith('BA_DEF_REL_') || line.startsWith('BA_REL_')) {
                db.attrRaw.push(line);
                continue;
            }

            if (line.startsWith('BA_DEF_DEF_')) {
                const dm = line.match(reAttrDefDef);
                if (dm) {
                    const def = db.attrDefs[dm[1]];
                    if (def) {
                        const v = parseAttrValue(def, dm[2]);
                        if (v !== null) def.defaultValue = v;
                        else parseIssues.push({ severity: 'warning', message: `BA_DEF_DEF_ default for '${dm[1]}' could not be interpreted — keeping type default.`, line: i + 1, raw: line });
                    } else {
                        parseIssues.push({ severity: 'warning', message: `BA_DEF_DEF_ references undefined attribute '${dm[1]}'.`, line: i + 1, raw: line });
                    }
                } else {
                    parseIssues.push({ severity: 'error', message: 'Malformed BA_DEF_DEF_ line — skipped.', line: i + 1, raw: line });
                }
                continue;
            }

            if (line.startsWith('BA_DEF_')) {
                const dm = line.match(reAttrDef);
                if (dm) {
                    const objectType = dm[1] || '';
                    if (objectType === 'EV_') { db.attrRaw.push(line); continue; } // env-var attrs: passthrough
                    const name = dm[2];
                    const valueType = dm[3];
                    const rest = (dm[4] || '').trim();
                    const def = { name, objectType, valueType, min: 0, max: 0, enumValues: [], defaultValue: valueType === 'STRING' ? '' : 0 };
                    if (valueType === 'ENUM') {
                        def.enumValues = [...rest.matchAll(/"([^"]*)"/g)].map(m2 => m2[1]);
                    } else if (valueType !== 'STRING') {
                        const nums = rest.split(/[\s,]+/).filter(Boolean).map(parseFloat);
                        if (nums.length >= 2 && nums.every(Number.isFinite)) { def.min = nums[0]; def.max = nums[1]; }
                    }
                    db.attrDefs[name] = def;
                } else {
                    parseIssues.push({ severity: 'error', message: 'Malformed BA_DEF_ (attribute definition) line — skipped.', line: i + 1, raw: line });
                }
                continue;
            }

            if (line.startsWith('BA_ ')) {
                // Defer: BO_/SG_ targets may not be parsed yet if BA_ appears early.
                pendingAttrAssigns.push({ line, lineNo: i + 1 });
                continue;
            }

            if (reValTable.test(line)) {
                // Preserve named value tables verbatim (round-trip only; not editable via GUI yet)
                db.valueTablesRaw.push(line);
                continue;
            }

            if (line.startsWith('BO_ ')) {
                const mMatch = line.match(reMsg);
                if (mMatch) {
                    const rawId = parseInt(mMatch[1], 10);
                    const isExt = (rawId & 0x80000000) !== 0;
                    const name = mMatch[2].trim();
                    const isIndependent = name === 'VECTOR__INDEPENDENT_SIG_MSG' || (rawId >>> 0) === 0xC0000000;

                    // Some tools emit the independent-signal container more than once —
                    // merge all of its blocks into a single container instead of duplicating it.
                    if (isIndependent) {
                        const existing = db.messages.find(m => m.isIndependent);
                        if (existing) { currentMsg = existing; continue; }
                    }

                    currentMsg = {
                        rawId: rawId, id: rawId & 0x1FFFFFFF, isExt: isExt,
                        name: name, dlc: parseInt(mMatch[3], 10),
                        node: mMatch[4].trim(), comment: '', attrs: {}, signals: [],
                        isIndependent: isIndependent
                    };
                    db.messages.push(currentMsg);
                } else {
                    currentMsg = null;
                    parseIssues.push({ severity: 'error', message: `Malformed BO_ (message) definition — line skipped.`, line: i + 1, raw: rawLine.trim() });
                }
                continue;
            }

            if (line.startsWith('SG_')) {
                if (!currentMsg) {
                    parseIssues.push({ severity: 'error', message: `SG_ (signal) found outside of any BO_ message block — skipped.`, line: i + 1, raw: rawLine.trim() });
                    continue;
                }
                const sMatch = line.match(reSig);
                if (sMatch) {
                    const muxRaw = sMatch[2] || '';
                    let muxType = 'none', muxValue = null;
                    if (muxRaw === 'M') muxType = 'M';
                    else if (muxRaw.startsWith('m')) { muxType = 'm'; muxValue = parseInt(muxRaw.slice(1), 10); }
                    const receiversStr = (sMatch[12] || '').trim();
                    const receivers = receiversStr && receiversStr !== 'Vector__XXX'
                        ? receiversStr.split(',').map(r => r.trim()).filter(Boolean)
                        : (receiversStr === 'Vector__XXX' ? [] : []);
                    const sigName = sMatch[1].trim();
                    // In the independent container, tools often repeat the same signal — keep one copy.
                    if (currentMsg.isIndependent && currentMsg.signals.some(s => s.name === sigName)) continue;
                    currentMsg.signals.push({
                        name: sigName, start: parseInt(sMatch[3], 10), len: parseInt(sMatch[4], 10),
                        order: sMatch[5], type: sMatch[6], factor: sMatch[7].trim(), offset: sMatch[8].trim(),
                        min: sMatch[9].trim(), max: sMatch[10].trim(), unit: sMatch[11] || '',
                        comment: '', attrs: {}, muxType, muxValue, receivers, valTable: {}
                    });
                } else {
                    parseIssues.push({ severity: 'error', message: `Malformed SG_ (signal) definition in message '${currentMsg.name}' — line skipped.`, line: i + 1, raw: rawLine.trim() });
                }
                continue;
            }

            if (line.startsWith('VAL_ ') ) {
                const vMatch = line.match(reVal);
                if (vMatch) {
                    const msgId = parseInt(vMatch[1], 10) & 0x1FFFFFFF;
                    const sigName = vMatch[2];
                    const targetMsg = findMsgByRawId(vMatch[1]);
                    if (targetMsg) {
                        const targetSig = targetMsg.signals.find(s => s.name === sigName);
                        if (targetSig) {
                            const valPairs = [...vMatch[3].matchAll(/(-?\d+)\s+"([^"]*)"/g)];
                            valPairs.forEach(p => { targetSig.valTable[p[1]] = p[2]; });
                        } else {
                            parseIssues.push({ severity: 'warning', message: `VAL_ references unknown signal '${sigName}' on message id ${msgId}.`, line: i + 1, raw: rawLine.trim() });
                        }
                    } else {
                        parseIssues.push({ severity: 'warning', message: `VAL_ references unknown message id ${msgId}.`, line: i + 1, raw: rawLine.trim() });
                    }
                } else {
                    parseIssues.push({ severity: 'error', message: `Malformed VAL_ (value table) line — skipped.`, line: i + 1, raw: rawLine.trim() });
                }
                continue;
            }
        }

        // Second pass: comments (can be matched globally, tolerant of embedded newlines)
        let m;
        reCmBU.lastIndex = 0;
        while ((m = reCmBU.exec(text)) !== null) { db.nodeComments[m[1]] = m[2]; }
        reCmBO.lastIndex = 0;
        while ((m = reCmBO.exec(text)) !== null) {
            const msg = findMsgByRawId(m[1]);
            if (msg) msg.comment = m[2];
        }
        reCmSG.lastIndex = 0;
        while ((m = reCmSG.exec(text)) !== null) {
            const msg = findMsgByRawId(m[1]);
            if (msg) {
                const sig = msg.signals.find(s => s.name === m[2]);
                if (sig) sig.comment = m[3];
            }
        }
        // Resolve BA_ assignments now that every node/message/signal is known.
        pendingAttrAssigns.forEach(({ line, lineNo }) => {
            const am = line.match(reAttrAssign);
            if (!am) { parseIssues.push({ severity: 'error', message: 'Malformed BA_ (attribute assignment) line — skipped.', line: lineNo, raw: line }); return; }
            const [, attrName, nodeName, boId, sgId, sgName, rawValue] = am;
            let def = db.attrDefs[attrName];
            if (!def) {
                // Vector requires a definition; recover by inferring one so the value round-trips.
                const looksNumeric = /^-?[\d.]+$/.test(rawValue.trim());
                def = { name: attrName, objectType: nodeName ? 'BU_' : (sgId ? 'SG_' : (boId ? 'BO_' : '')), valueType: looksNumeric ? 'FLOAT' : 'STRING', min: 0, max: 0, enumValues: [], defaultValue: looksNumeric ? 0 : '' };
                db.attrDefs[attrName] = def;
                parseIssues.push({ severity: 'warning', message: `BA_ uses undefined attribute '${attrName}' — an implicit ${def.valueType} definition was created.`, line: lineNo, raw: line });
            }
            const value = parseAttrValue(def, rawValue);
            if (value === null) { parseIssues.push({ severity: 'warning', message: `BA_ value for '${attrName}' could not be interpreted — skipped.`, line: lineNo, raw: line }); return; }

            if (nodeName) {
                if (!db.nodeAttrs[nodeName]) db.nodeAttrs[nodeName] = {};
                db.nodeAttrs[nodeName][attrName] = value;
            } else if (sgId !== undefined && sgId !== null && sgId !== '') {
                const msg = findMsgByRawId(sgId);
                const sig = msg ? msg.signals.find(s => s.name === sgName) : null;
                if (sig) sig.attrs[attrName] = value;
                else parseIssues.push({ severity: 'warning', message: `BA_ '${attrName}' references unknown signal '${sgName}' on message id ${sgId}.`, line: lineNo, raw: line });
            } else if (boId !== undefined && boId !== null && boId !== '') {
                const msg = findMsgByRawId(boId);
                if (msg) msg.attrs[attrName] = value;
                else parseIssues.push({ severity: 'warning', message: `BA_ '${attrName}' references unknown message id ${boId}.`, line: lineNo, raw: line });
            } else {
                db.netAttrs[attrName] = value;
            }
        });

        // Make sure the five standard Gen* attributes exist (file definitions win).
        seedStandardAttrs();

        db.messages.forEach(m => { if (!db.nodes.includes(m.node)) db.nodes.push(m.node); });
        if (db.nodes.length === 0) db.nodes.push('Vector__XXX');

        loadedFileName = loadedFileName || 'imported.dbc';
        document.getElementById('fileBadge').innerText = loadedFileName;

        renderTree();
        showEmptyState();
        runValidation();

        const errCount = parseIssues.filter(p => p.severity === 'error').length;
        if (!suppressParseToasts) {
            if (errCount > 0) {
                showToast(`File loaded with ${errCount} syntax error(s). See Problems panel.`, 'error');
                document.getElementById('problemsPanel').classList.add('open');
            } else {
                showToast(`Database loaded: ${db.messages.length} message(s), ${db.nodes.length} node(s).`, 'success');
            }
        }
    }

    /* ============================= VALIDATION ENGINE ============================= */
    function runValidation() {
        const problems = [...parseIssues];

        // Node checks
        const seenNodes = {};
        db.nodes.forEach(n => {
            if (!IDENT_RE.test(n)) problems.push({ severity: 'error', message: `Node name '${n}' is not a valid DBC identifier (letters, digits, underscore; cannot start with a digit).`, ref: { type: 'node', name: n } });
            if (seenNodes[n]) problems.push({ severity: 'error', message: `Duplicate node name '${n}'.`, ref: { type: 'node', name: n } });
            seenNodes[n] = true;
        });

        // Attribute assignment checks — type conformity, numeric range, ENUM index.
        function checkAttrs(attrsObj, ownerLabel, ref) {
            if (!attrsObj) return;
            Object.keys(attrsObj).forEach(name => {
                const def = db.attrDefs[name];
                const value = attrsObj[name];
                if (!def) { problems.push({ severity: 'error', message: `${ownerLabel} has a value for undefined attribute '${name}'.`, ref }); return; }
                if (def.valueType === 'ENUM') {
                    if (!Number.isInteger(value) || value < 0 || value >= def.enumValues.length) {
                        problems.push({ severity: 'error', message: `${ownerLabel}: attribute '${name}' has ENUM index ${value}, but only ${def.enumValues.length} values are defined.`, ref });
                    }
                } else if (def.valueType !== 'STRING') {
                    if (!Number.isFinite(value)) {
                        problems.push({ severity: 'error', message: `${ownerLabel}: attribute '${name}' must be numeric.`, ref });
                    } else if (def.min !== def.max && (value < def.min || value > def.max)) {
                        problems.push({ severity: 'error', message: `${ownerLabel}: attribute '${name}' value ${value} is outside its defined range [${def.min} … ${def.max}].`, ref });
                    }
                }
            });
        }
        checkAttrs(db.netAttrs, 'Network', null);
        Object.keys(db.nodeAttrs).forEach(n => checkAttrs(db.nodeAttrs[n], `Node '${n}'`, { type: 'node', name: n }));
        db.messages.forEach((msg, mIdx) => {
            if (msg.isIndependent) return;
            checkAttrs(msg.attrs, `Message '${msg.name}'`, { type: 'msg', idx: mIdx });
            msg.signals.forEach((sig, sIdx) => {
                checkAttrs(sig.attrs, `Signal '${sig.name}'`, { type: 'sig', idx: mIdx, sIdx });
                // GenSigStartValue is a RAW value — it must fit the signal's bit capacity.
                const sv = sig.attrs['GenSigStartValue'];
                if (sv !== undefined && Number.isFinite(sig.len) && sig.len > 0 && sig.len <= 64) {
                    const maxRaw = sig.type === '+' ? Math.pow(2, sig.len) - 1 : Math.pow(2, sig.len - 1) - 1;
                    const minRaw = sig.type === '+' ? 0 : -Math.pow(2, sig.len - 1);
                    if (sv > maxRaw || sv < minRaw) {
                        problems.push({ severity: 'warning', message: `Signal '${sig.name}': GenSigStartValue ${sv} does not fit in a ${sig.len}-bit ${sig.type === '+' ? 'unsigned' : 'signed'} raw value [${minRaw} … ${maxRaw}].`, ref: { type: 'sig', idx: mIdx, sIdx } });
                    }
                }
            });
        });

        // Message checks
        const seenIds = {};
        const seenMsgNames = {};
        db.messages.forEach((msg, mIdx) => {
            // The Vector "independent signals" container (VECTOR__INDEPENDENT_SIG_MSG) is a pure
            // bookkeeping placeholder, not a real CAN frame. It is fully exempt from validation:
            // no ID/DLC/transmitter checks, no bit-layout checks, and no signal-level checks
            // (duplicate names are legal there — Vector itself stores repeated names in it).
            if (msg.isIndependent) return;

            if (!IDENT_RE.test(msg.name)) problems.push({ severity: 'error', message: `Message '${msg.name}' has an invalid name.`, ref: { type: 'msg', idx: mIdx } });
            const nameKey = msg.name;
            if (seenMsgNames[nameKey]) problems.push({ severity: 'error', message: `Duplicate message name '${msg.name}'.`, ref: { type: 'msg', idx: mIdx } });
            seenMsgNames[nameKey] = true;

            const idKey = (msg.isExt ? 'X' : 'S') + msg.id;
            if (seenIds[idKey]) problems.push({ severity: 'error', message: `Duplicate message ID ${msg.id} (0x${msg.id.toString(16).toUpperCase()}) — conflicts with another ${msg.isExt ? 'extended' : 'standard'} frame.`, ref: { type: 'msg', idx: mIdx } });
            seenIds[idKey] = true;

            const maxId = msg.isExt ? 0x1FFFFFFF : 0x7FF;
            if (msg.id < 0 || msg.id > maxId) problems.push({ severity: 'error', message: `Message '${msg.name}' ID ${msg.id} is out of range for a ${msg.isExt ? '29-bit extended' : '11-bit standard'} identifier (max 0x${maxId.toString(16)}).`, ref: { type: 'msg', idx: mIdx } });

            if (msg.dlc < 0 || msg.dlc > 64) problems.push({ severity: 'error', message: `Message '${msg.name}' has an invalid DLC of ${msg.dlc} (must be 0-64).`, ref: { type: 'msg', idx: mIdx } });
            else if (msg.dlc > 8) problems.push({ severity: 'warning', message: `Message '${msg.name}' has DLC ${msg.dlc} > 8 — only valid on a CAN FD bus.`, ref: { type: 'msg', idx: mIdx } });

            if (!db.nodes.includes(msg.node)) problems.push({ severity: 'error', message: `Message '${msg.name}' transmitter '${msg.node}' is not a defined node.`, ref: { type: 'msg', idx: mIdx } });

            // Signal checks
            const seenSigNames = {};
            let muxorCount = 0, muxedCount = 0;
            const bitOwners = {};
            const availableBits = msg.dlc * 8;

            msg.signals.forEach((sig, sIdx) => {
                if (!IDENT_RE.test(sig.name)) problems.push({ severity: 'error', message: `Signal '${sig.name}' in message '${msg.name}' has an invalid name.`, ref: { type: 'sig', idx: mIdx, sIdx } });
                if (seenSigNames[sig.name]) problems.push({ severity: 'error', message: `Duplicate signal name '${sig.name}' in message '${msg.name}'.`, ref: { type: 'sig', idx: mIdx, sIdx } });
                seenSigNames[sig.name] = true;

                if (!Number.isFinite(sig.len) || sig.len <= 0 || sig.len > 64) problems.push({ severity: 'error', message: `Signal '${sig.name}' has invalid length ${sig.len} (must be 1-64 bits).`, ref: { type: 'sig', idx: mIdx, sIdx } });
                if (!Number.isFinite(sig.start) || sig.start < 0 || sig.start > 63) problems.push({ severity: 'error', message: `Signal '${sig.name}' has an invalid start bit ${sig.start}.`, ref: { type: 'sig', idx: mIdx, sIdx } });

                [['factor', sig.factor], ['offset', sig.offset], ['min', sig.min], ['max', sig.max]].forEach(([label, v]) => {
                    if (v === '' || isNaN(parseFloat(v))) problems.push({ severity: 'error', message: `Signal '${sig.name}' has a non-numeric ${label} value ("${v}").`, ref: { type: 'sig', idx: mIdx, sIdx } });
                });
                if (!isNaN(parseFloat(sig.min)) && !isNaN(parseFloat(sig.max)) && parseFloat(sig.min) > parseFloat(sig.max)) {
                    problems.push({ severity: 'warning', message: `Signal '${sig.name}' minimum (${sig.min}) is greater than maximum (${sig.max}).`, ref: { type: 'sig', idx: mIdx, sIdx } });
                }

                sig.receivers.forEach(r => {
                    if (!db.nodes.includes(r)) problems.push({ severity: 'warning', message: `Signal '${sig.name}' lists unknown receiver node '${r}'.`, ref: { type: 'sig', idx: mIdx, sIdx } });
                });

                if (sig.muxType === 'M') muxorCount++;
                if (sig.muxType === 'm') muxedCount++;

                if (Number.isFinite(sig.len) && sig.len > 0 && Number.isFinite(sig.start)) {
                    const bits = computeSignalBits(sig);
                    const maxBit = Math.max(...bits);
                    const minBit = Math.min(...bits);
                    if (availableBits > 0 && (maxBit >= availableBits || minBit < 0)) {
                        problems.push({ severity: 'error', message: `Signal '${sig.name}' (bits ${minBit}-${maxBit}) exceeds the message payload of ${availableBits} bits (DLC=${msg.dlc}).`, ref: { type: 'sig', idx: mIdx, sIdx } });
                    }
                    bits.forEach(b => { if (!bitOwners[b]) bitOwners[b] = []; bitOwners[b].push({ sIdx, muxType: sig.muxType, muxValue: sig.muxValue }); });
                }
            });

            if (muxedCount > 0 && muxorCount === 0) problems.push({ severity: 'warning', message: `Message '${msg.name}' has multiplexed signal(s) but no multiplexor (M) signal defined.`, ref: { type: 'msg', idx: mIdx } });
            if (muxorCount > 1) problems.push({ severity: 'error', message: `Message '${msg.name}' defines more than one multiplexor (M) signal.`, ref: { type: 'msg', idx: mIdx } });

            Object.keys(bitOwners).forEach(bit => {
                const owners = bitOwners[bit];
                if (owners.length <= 1) return;
                // Signals under different mux values legitimately share bits; only flag when
                // both are unconditional (none/M) or share the same mux selector value.
                const conflict = owners.some((o, i) => owners.some((o2, j) => {
                    if (i >= j) return false;
                    const bothUnconditional = (o.muxType !== 'm') && (o2.muxType !== 'm');
                    const sameMuxValue = (o.muxType === 'm' && o2.muxType === 'm' && o.muxValue === o2.muxValue);
                    const mixedUnconditionalMuxed = (o.muxType !== 'm') !== (o2.muxType !== 'm');
                    return bothUnconditional || sameMuxValue || mixedUnconditionalMuxed;
                }));
                if (conflict) {
                    const names = [...new Set(owners.map(o => msg.signals[o.sIdx].name))];
                    problems.push({ severity: 'error', message: `Bit ${bit} in message '${msg.name}' is claimed by overlapping signals: ${names.join(', ')}.`, ref: { type: 'msg', idx: mIdx } });
                }
            });
        });

        problems.sort((a, b) => (a.severity === 'error' ? 0 : 1) - (b.severity === 'error' ? 0 : 1));
        renderProblems(problems);
        return problems;
    }

    function renderProblems(problems) {
        const list = document.getElementById('problemsList');
        const errCount = problems.filter(p => p.severity === 'error').length;
        const warnCount = problems.filter(p => p.severity === 'warning').length;
        document.getElementById('errCount').innerText = errCount;
        document.getElementById('warnCount').innerText = warnCount;

        if (problems.length === 0) {
            list.innerHTML = '<div class="problems-empty">No problems detected. Database looks structurally valid.</div>';
            return;
        }
        list.innerHTML = '';
        problems.forEach(p => {
            const row = document.createElement('div');
            row.className = 'problem-row ' + p.severity;
            const icon = p.severity === 'error' ? '⛔' : '⚠';
            const loc = p.line ? `Line ${p.line}` : (p.ref && p.ref.type === 'msg' ? db.messages[p.ref.idx].name : (p.ref && p.ref.type === 'sig' ? db.messages[p.ref.idx].signals[p.ref.sIdx].name : ''));
            row.innerHTML = `<span class="problem-icon">${icon}</span><span>${escapeHtml(p.message)}</span><span class="problem-loc">${escapeHtml(loc || '')}</span>`;
            row.onclick = () => jumpToProblem(p);
            list.appendChild(row);
        });
    }

    function jumpToProblem(p) {
        document.getElementById('problemsPanel').classList.remove('open');
        if (!p.ref) return;
        if (p.ref.type === 'node') openNodeEditor(p.ref.name);
        else if (p.ref.type === 'msg') openMessageEditor(p.ref.idx);
        else if (p.ref.type === 'sig') openSignalEditor(p.ref.idx, p.ref.sIdx);
    }

    function toggleProblemsPanel() { document.getElementById('problemsPanel').classList.toggle('open'); }

    // Re-runs validation and refreshes the Problems panel + tree error/warning
    // highlighting in place, without rebuilding the whole tree (which would lose
    // collapse state and the search filter). Call this after any edit made from
    // the Message/Signal/Node property forms so error status never goes stale.
    function refreshValidationStatus() {
        const refs = runValidationRefsOnly(); // runs validation, which also updates the Problems panel + counts
        document.querySelectorAll('.tree-item.err-item, .tree-item.warn-item').forEach(el => el.classList.remove('err-item', 'warn-item'));
        refs.msgErr.forEach(idx => { const el = document.getElementById(`tree_m_${idx}`); if (el) el.classList.add('err-item'); });
        refs.msgWarn.forEach(idx => { if (refs.msgErr.has(idx)) return; const el = document.getElementById(`tree_m_${idx}`); if (el) el.classList.add('warn-item'); });
        refs.sigErr.forEach(key => { const el = document.getElementById(`tree_m_${key.replace(':', '_s_')}`); if (el) el.classList.add('err-item'); });
        refs.sigWarn.forEach(key => { if (refs.sigErr.has(key)) return; const el = document.getElementById(`tree_m_${key.replace(':', '_s_')}`); if (el) el.classList.add('warn-item'); });
    }

    function escapeHtml(s) { const d = document.createElement('div'); d.innerText = s; return d.innerHTML; }

    /* ============================= TREE ============================= */
    function renderTree() {
        const tree = document.getElementById('treeContainer');
        tree.innerHTML = '';
        if (db.nodes.length === 0 && db.messages.length === 0) {
            tree.innerHTML = '<div class="empty-state" style="font-size: 0.85rem;">Create or Open a database</div>';
            return;
        }

        const filter = (document.getElementById('treeSearch').value || '').trim().toLowerCase();
        const problemRefs = runValidationRefsOnly();

        // --- Independent Signals (Vector's VECTOR__INDEPENDENT_SIG_MSG container) ---
        const indepMsg = db.messages.find(m => m.isIndependent);
        if (indepMsg && indepMsg.signals.length > 0) {
            const mIdx = db.messages.indexOf(indepMsg);
            const matchingSigs = indepMsg.signals.filter(s => !filter || s.name.toLowerCase().includes(filter));
            const sectionVisible = !filter || matchingSigs.length > 0;

            const indepDiv = document.createElement('div');
            indepDiv.className = 'tree-item' + (sectionVisible ? '' : ' dimmed');
            indepDiv.innerHTML = `<span class="tree-toggle" onclick="toggleNode(event, 'indepRoot')">▼</span><span class="tree-item-icon icon-indep">📎</span><span class="tree-label">Independent Signals</span>`;
            tree.appendChild(indepDiv);

            const indepCont = document.createElement('div');
            indepCont.className = 'tree-children';
            indepCont.id = 'indepRoot';
            indepMsg.signals.forEach((sig, sIdx) => {
                const sigMatches = !filter || sig.name.toLowerCase().includes(filter);
                const key = mIdx + ':' + sIdx;
                const sDiv = document.createElement('div');
                sDiv.className = 'tree-item' + (sigMatches ? '' : ' dimmed') + (problemRefs.sigErr.has(key) ? ' err-item' : (problemRefs.sigWarn.has(key) ? ' warn-item' : ''));
                sDiv.id = `tree_m_${mIdx}_s_${sIdx}`;
                sDiv.innerHTML = `<span class="tree-toggle"></span><span class="tree-item-icon"><i class="icon-signal"></i></span><span class="tree-label">${escapeHtml(sig.name)}</span>`;
                sDiv.onclick = (e) => { e.stopPropagation(); openSignalEditor(mIdx, sIdx); };
                indepCont.appendChild(sDiv);
            });
            tree.appendChild(indepCont);
        }

        const netDiv = document.createElement('div');
        netDiv.className = 'tree-item';
        netDiv.innerHTML = `<span class="tree-toggle" onclick="toggleNode(event, 'netRoot')">▼</span><span class="tree-item-icon icon-net">🌐</span><span class="tree-label">Network</span>`;
        tree.appendChild(netDiv);

        const netCont = document.createElement('div');
        netCont.className = 'tree-children';
        netCont.id = 'netRoot';

        db.nodes.forEach((nName, nIdx) => {
            const nodeMsgs = db.messages.map((m, i) => ({ msg: m, idx: i })).filter(item => item.msg.node === nName && !item.msg.isIndependent);
            const hasMsgs = nodeMsgs.length > 0;
            const nodeMatches = !filter || nName.toLowerCase().includes(filter);
            const anyChildMatches = filter && nodeMsgs.some(item => item.msg.name.toLowerCase().includes(filter) || item.msg.signals.some(s => s.name.toLowerCase().includes(filter)));
            const nodeVisible = !filter || nodeMatches || anyChildMatches;

            const nd = document.createElement('div');
            nd.className = 'tree-item' + (nodeVisible ? '' : ' dimmed');
            const nodeCaret = hasMsgs ? `<span class="tree-toggle" onclick="toggleNode(event, 'node_${nIdx}')">▼</span>` : `<span class="tree-toggle"></span>`;
            nd.innerHTML = `${nodeCaret}<span class="tree-item-icon icon-node">💻</span><span class="tree-label">${escapeHtml(nName)}</span>`;
            nd.onclick = () => openNodeEditor(nName);
            netCont.appendChild(nd);

            if (hasMsgs) {
                const msgsCont = document.createElement('div');
                msgsCont.className = 'tree-children';
                msgsCont.id = `node_${nIdx}`;

                nodeMsgs.forEach(item => {
                    const msg = item.msg;
                    const mIdx = item.idx;
                    const hasSigs = msg.signals.length > 0;
                    const msgMatches = !filter || msg.name.toLowerCase().includes(filter) || msg.signals.some(s => s.name.toLowerCase().includes(filter));

                    const mDiv = document.createElement('div');
                    mDiv.className = 'tree-item' + (msgMatches ? '' : ' dimmed') + (problemRefs.msgErr.has(mIdx) ? ' err-item' : (problemRefs.msgWarn.has(mIdx) ? ' warn-item' : ''));
                    mDiv.id = `tree_m_${mIdx}`;
                    const msgCaret = hasSigs ? `<span class="tree-toggle" onclick="toggleNode(event, 'ch_${mIdx}')">▼</span>` : `<span class="tree-toggle"></span>`;
                    mDiv.innerHTML = `${msgCaret}<span class="tree-item-icon icon-m">✉</span><span class="tree-label">${escapeHtml(msg.name)} (0x${msg.id.toString(16).toUpperCase()})</span>`;
                    mDiv.onclick = (e) => { e.stopPropagation(); openMessageEditor(mIdx); };
                    msgsCont.appendChild(mDiv);

                    if (hasSigs) {
                        const sCont = document.createElement('div');
                        sCont.className = 'tree-children';
                        sCont.id = `ch_${mIdx}`;
                        msg.signals.forEach((sig, sIdx) => {
                            const sigMatches = !filter || sig.name.toLowerCase().includes(filter) || msg.name.toLowerCase().includes(filter);
                            const key = mIdx + ':' + sIdx;
                            const sDiv = document.createElement('div');
                            sDiv.className = 'tree-item' + (sigMatches ? '' : ' dimmed') + (problemRefs.sigErr.has(key) ? ' err-item' : (problemRefs.sigWarn.has(key) ? ' warn-item' : ''));
                            sDiv.id = `tree_m_${mIdx}_s_${sIdx}`;
                            const muxLabel = sig.muxType === 'M' ? '<span class="tree-badge mux">MUX</span>' : (sig.muxType === 'm' ? `<span class="tree-badge mux">m${sig.muxValue}</span>` : '');
                            sDiv.innerHTML = `<span class="tree-toggle"></span><span class="tree-item-icon"><i class="icon-signal"></i></span><span class="tree-label">${escapeHtml(sig.name)}</span>${muxLabel}`;
                            sDiv.onclick = (e) => { e.stopPropagation(); openSignalEditor(mIdx, sIdx); };
                            sCont.appendChild(sDiv);
                        });
                        msgsCont.appendChild(sCont);
                    }
                });
                netCont.appendChild(msgsCont);
            }
        });
        tree.appendChild(netCont);
    }

    // Lightweight pass to know which tree rows need an error/warning highlight, without re-rendering the problems panel.
    function runValidationRefsOnly() {
        const problems = runValidation();
        const out = { msgErr: new Set(), msgWarn: new Set(), sigErr: new Set(), sigWarn: new Set() };
        problems.forEach(p => {
            if (!p.ref) return;
            if (p.ref.type === 'msg') { (p.severity === 'error' ? out.msgErr : out.msgWarn).add(p.ref.idx); }
            if (p.ref.type === 'sig') { const key = p.ref.idx + ':' + p.ref.sIdx; (p.severity === 'error' ? out.sigErr : out.sigWarn).add(key); }
        });
        return out;
    }

    function toggleNode(event, id) {
        event.stopPropagation();
        const el = document.getElementById(id);
        const caret = event.target;
        if (el.classList.contains('collapsed')) { el.classList.remove('collapsed'); caret.innerText = '▼'; }
        else { el.classList.add('collapsed'); caret.innerText = '▶'; }
    }

    function clearActiveTree() { document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active')); }

    /* ============================= EDITOR ROUTERS ============================= */
    function showEmptyState() {
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('editorTabs').style.display = 'none';
        document.querySelectorAll('.editor-content').forEach(el => el.classList.remove('active'));
    }

    // The tab the user last chose. When switching to another message/signal/
    // node, the same tab stays open (in the context of the new object) instead
    // of snapping back to Properties. If the remembered tab doesn't exist for
    // the new object type (e.g. Matrix Layout when a signal is selected), we
    // fall back to Properties.
    let currentTabId = 'attributes';

    function setupTabs(showLayout, showVals) {
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('editorTabs').style.display = 'flex';
        document.getElementById('tabLayout').style.display = showLayout ? 'block' : 'none';
        document.getElementById('tabVals').style.display = showVals ? 'block' : 'none';

        let desired = currentTabId;
        if (desired === 'layout' && !showLayout) desired = 'attributes';
        if (desired === 'values' && !showVals) desired = 'attributes';
        activateTab(desired);
    }

    function activateTab(tabId) {
        currentTabId = tabId;
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.editor-content').forEach(el => el.classList.remove('active'));
        const btn = document.querySelector(`#editorTabs .tab-btn[onclick*="'${tabId}'"]`);
        if (btn) btn.classList.add('active');
        const content = document.getElementById(`content_${tabId}`);
        if (content) content.classList.add('active');
        if (tabId === 'layout' && activeType === 'msg') renderLayoutMatrix();
        if (tabId === 'values' && activeType === 'sig') renderValueTable();
        if (tabId === 'objattrs') renderObjAttrs();
    }

    function switchTab(tabId) { activateTab(tabId); }

    /* ============================= ADD / DELETE WORKFLOWS ============================= */
    function addNode() {
        promptDialog('Add Node', 'Node Name', '', (val) => {
            if (!val) return 'Name cannot be empty.';
            const safe = val.replace(/\s+/g, '_');
            if (!IDENT_RE.test(safe)) return 'Must start with a letter/underscore and contain only letters, digits, underscore.';
            if (db.nodes.includes(safe)) return 'A node with this name already exists.';
            db.nodes.push(safe);
            renderTree();
            openNodeEditor(safe);
            showToast(`Node '${safe}' added.`, 'success');
        });
    }

    function deleteNode() {
        if (!activeNodeName) return;
        confirmDialog('Delete Node', `Delete node <b>${escapeHtml(activeNodeName)}</b>? Messages transmitted by it will be reassigned to <b>Vector__XXX</b>.`, () => {
            db.nodes = db.nodes.filter(n => n !== activeNodeName);
            delete db.nodeComments[activeNodeName];
            delete db.nodeAttrs[activeNodeName];
            db.messages.forEach(m => { if (m.node === activeNodeName) m.node = 'Vector__XXX'; });
            db.messages.forEach(m => m.signals.forEach(s => { s.receivers = s.receivers.filter(r => r !== activeNodeName); }));
            if (!db.nodes.includes('Vector__XXX')) db.nodes.push('Vector__XXX');
            activeType = null; activeNodeName = null;
            renderTree();
            showEmptyState();
            showToast('Node deleted.', 'success');
        }, 'Delete');
    }

    function addMessage() {
        if (!activeNodeName) return;
        const usedIds = new Set(db.messages.map(m => m.id));
        let nextId = 100;
        while (usedIds.has(nextId)) nextId++;
        db.messages.push({ id: nextId, rawId: nextId, isExt: false, name: `NewMessage_${nextId}`, dlc: 8, node: activeNodeName, comment: '', attrs: {}, signals: [], isIndependent: false });
        renderTree();
        openMessageEditor(db.messages.length - 1);
        showToast('Message added.', 'success');
    }

    function deleteMessage() {
        if (activeMsgIndex === null) return;
        const name = db.messages[activeMsgIndex].name;
        confirmDialog('Delete Message', `Delete message <b>${escapeHtml(name)}</b> and all of its signals?`, () => {
            db.messages.splice(activeMsgIndex, 1);
            activeType = null; activeMsgIndex = null;
            renderTree();
            showEmptyState();
            showToast('Message deleted.', 'success');
        }, 'Delete');
    }

    function addSignal() {
        if (activeMsgIndex === null) return;
        const msg = db.messages[activeMsgIndex];
        let n = 1;
        while (msg.signals.some(s => s.name === `NewSignal${n}`)) n++;
        msg.signals.push({ name: `NewSignal${n}`, start: 0, len: 8, order: '1', type: '+', factor: '1', offset: '0', min: '0', max: '255', unit: '', comment: '', attrs: {}, muxType: 'none', muxValue: null, receivers: [], valTable: {} });
        renderTree();
        openSignalEditor(activeMsgIndex, msg.signals.length - 1);
        showToast('Signal added.', 'success');
    }

    function addIndependentSignal() {
        let msg = db.messages.find(m => m.isIndependent);
        if (!msg) {
            if (!db.nodes.includes('Vector__XXX')) db.nodes.push('Vector__XXX');
            msg = { id: 0, rawId: 3221225472, isExt: true, name: 'VECTOR__INDEPENDENT_SIG_MSG', dlc: 0, node: 'Vector__XXX', comment: '', attrs: {}, signals: [], isIndependent: true };
            db.messages.push(msg);
        }
        const mIdx = db.messages.indexOf(msg);
        let n = 1;
        while (msg.signals.some(s => s.name === `IndepSignal${n}`)) n++;
        msg.signals.push({ name: `IndepSignal${n}`, start: 0, len: 8, order: '1', type: '+', factor: '1', offset: '0', min: '0', max: '255', unit: '', comment: '', muxType: 'none', muxValue: null, receivers: [], valTable: {} });
        renderTree();
        openSignalEditor(mIdx, msg.signals.length - 1);
        showToast('Independent signal added — not tied to any CAN message.', 'success');
    }

    function deleteSignal() {
        if (activeMsgIndex === null || activeSigIndex === null) return;
        const msg = db.messages[activeMsgIndex];
        const name = msg.signals[activeSigIndex].name;
        confirmDialog('Delete Signal', `Delete signal <b>${escapeHtml(name)}</b>?`, () => {
            msg.signals.splice(activeSigIndex, 1);
            if (msg.isIndependent) {
                activeType = null; activeMsgIndex = null; activeSigIndex = null;
                renderTree();
                showEmptyState();
            } else {
                activeType = 'msg';
                const mIdxToReturnTo = activeMsgIndex;
                activeSigIndex = null;
                renderTree();
                openMessageEditor(mIdxToReturnTo);
            }
            showToast('Signal deleted.', 'success');
        }, 'Delete');
    }

    /* ============================= NODE EDITOR ============================= */
    function openNodeEditor(nName) {
        activeType = 'node'; activeNodeName = nName;
        clearActiveTree();
        const match = Array.from(document.querySelectorAll('.tree-item')).find(el => el.querySelector('.tree-label') && el.querySelector('.tree-label').innerText === nName);
        if (match) match.classList.add('active');

        setupTabs(false, false);
        const container = document.getElementById('content_attributes');
        container.innerHTML = `
            <div class="editor-form">
                <div class="editor-header">
                    <span><span class="icon-node">💻</span> Node Properties</span>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-sm primary" onclick="addMessage()">+ Add Message in Node</button>
                        <button class="btn-sm danger" onclick="deleteNode()">🗑️ Delete Node</button>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Node Name</label>
                        <input type="text" id="n_name" value="${escapeHtml(nName)}" oninput="updateNode()">
                    </div>
                    <div class="form-group full">
                        <label>Comment</label>
                        <textarea id="n_comment" oninput="updateNodeComment()">${escapeHtml(db.nodeComments[nName] || '')}</textarea>
                    </div>
                </div>
            </div>
        `;
    }

    function updateNode() {
        const raw = document.getElementById('n_name').value.trim().replace(/\s+/g, '_');
        if (!raw) return;
        const idx = db.nodes.indexOf(activeNodeName);
        if (idx === -1) return;
        if (raw !== activeNodeName && db.nodes.includes(raw)) { showToast('A node with this name already exists.', 'error'); return; }
        db.nodes[idx] = raw;
        if (db.nodeComments[activeNodeName] !== undefined) { db.nodeComments[raw] = db.nodeComments[activeNodeName]; delete db.nodeComments[activeNodeName]; }
        if (db.nodeAttrs[activeNodeName] !== undefined) { db.nodeAttrs[raw] = db.nodeAttrs[activeNodeName]; delete db.nodeAttrs[activeNodeName]; }
        db.messages.forEach(m => { if (m.node === activeNodeName) m.node = raw; });
        db.messages.forEach(m => m.signals.forEach(s => { s.receivers = s.receivers.map(r => r === activeNodeName ? raw : r); }));
        activeNodeName = raw;
        renderTree();
        refreshValidationStatus();
    }

    function updateNodeComment() {
        db.nodeComments[activeNodeName] = document.getElementById('n_comment').value;
        refreshValidationStatus();
    }

    /* ============================= MESSAGE EDITOR ============================= */
    function openMessageEditor(mIdx) {
        activeType = 'msg'; activeMsgIndex = mIdx; activeSigIndex = null;
        clearActiveTree();
        const msg = db.messages[mIdx];

        if (msg.isIndependent) {
            setupTabs(false, false);
            document.getElementById('content_attributes').innerHTML = `
                <div class="editor-form">
                    <div class="editor-header"><span><i class="icon-signal" style="margin-right:6px; background-color: var(--icon-indep);"></i> Independent Signals</span></div>
                    <p style="color:var(--text-muted); font-size:0.85rem; line-height:1.5;">
                        This is Vector's reserved container for signals that are not assigned to any CAN message
                        (<code>VECTOR__INDEPENDENT_SIG_MSG</code>). They're defined for reuse but never transmitted on the bus,
                        so DLC, transmitter, and bit-layout checks don't apply to them. Select an individual signal in the tree to edit it.
                    </p>
                </div>`;
            return;
        }
        const el = document.getElementById(`tree_m_${mIdx}`);
        if (el) el.classList.add('active');
        setupTabs(true, false);

        let nodeOptions = db.nodes.map(n => `<option value="${escapeHtml(n)}" ${msg.node === n ? 'selected' : ''}>${escapeHtml(n)}</option>`).join('');

        const container = document.getElementById('content_attributes');
        container.innerHTML = `
            <div class="editor-form">
                <div class="editor-header">
                    <span><span class="icon-m">✉</span> Message Properties</span>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-sm primary" onclick="addSignal()">+ Add Signal in Message</button>
                        <button class="btn-sm danger" onclick="deleteMessage()">🗑️ Delete Message</button>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Name</label><input type="text" id="m_name" value="${escapeHtml(msg.name)}" oninput="updateMessage('name')">
                    </div>
                    <div class="form-group">
                        <label>ID (Decimal)</label><input type="number" id="m_id" value="${msg.id}" oninput="updateMessage('id')">
                    </div>
                    <div class="form-group">
                        <label>DLC (Bytes)</label><input type="number" id="m_dlc" value="${msg.dlc}" oninput="updateMessage('dlc')">
                    </div>
                    <div class="form-group">
                        <label>Transmitter Node</label>
                        <select id="m_node" onchange="updateMessage('node')">${nodeOptions}</select>
                    </div>
                    <div class="form-group">
                        <label>ID Type</label>
                        <select id="m_ext" onchange="updateMessage('ext')">
                            <option value="false" ${!msg.isExt ? 'selected' : ''}>Standard (11-bit)</option>
                            <option value="true" ${msg.isExt ? 'selected' : ''}>Extended (29-bit)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Cycle Time (ms) — GenMsgCycleTime</label><input type="number" id="m_cycle" value="${msg.attrs['GenMsgCycleTime'] === undefined ? '' : msg.attrs['GenMsgCycleTime']}" placeholder="default: ${db.attrDefs['GenMsgCycleTime'] ? db.attrDefs['GenMsgCycleTime'].defaultValue : 0}" oninput="updateMessage('cycle')">
                    </div>
                    <div class="form-group full">
                        <label>Comment</label>
                        <textarea id="m_comment" oninput="updateMessage('comment')">${escapeHtml(msg.comment || '')}</textarea>
                    </div>
                </div>
            </div>
        `;
    }

    function updateMessage(field) {
        const msg = db.messages[activeMsgIndex];
        if (field === 'comment') { msg.comment = document.getElementById('m_comment').value; refreshValidationStatus(); return; }
        const val = document.getElementById(`m_${field}`).value;
        if (field === 'name') msg.name = val.replace(/\s+/g, '_');
        if (field === 'id') msg.id = parseInt(val, 10) || 0;
        if (field === 'dlc') msg.dlc = parseInt(val, 10) || 0;
        if (field === 'node') msg.node = val;
        if (field === 'ext') msg.isExt = (val === 'true');
        if (field === 'cycle') { if (val === '') delete msg.attrs['GenMsgCycleTime']; else msg.attrs['GenMsgCycleTime'] = parseFloat(val); }

        renderTree();
        const el = document.getElementById(`tree_m_${activeMsgIndex}`);
        if (el) el.classList.add('active');
        refreshValidationStatus();
    }

        }).join('');

                </div>

                        <label>Start Bit</label><input type="number" id="s_start" value="${sig.start}" oninput="updateSignal('start')">

                        <label>Maximum</label><input type="number" step="any" id="s_max" value="${sig.max}" oninput="updateSignal('max')">
                    </div>
                    <div class="form-group full">
                        <label>Unit</label><input type="text" id="s_unit" value="${escapeHtml(sig.unit)}" oninput="updateSignal('unit')">

                    <div class="form-group full">
                        <label>Receiver Nodes</label>
                        <div class="receiver-list">${receiverChips || '<span style="color:var(--text-muted);font-size:0.8rem;">No nodes defined yet</span>'}</div>

    }

    function toggleReceiver(el, nodeName) {
        const sig = db.messages[activeMsgIndex].signals[activeSigIndex];
        const idx = sig.receivers.indexOf(nodeName);
        if (idx > -1) { sig.receivers.splice(idx, 1); el.classList.remove('checked'); el.querySelector('input').checked = false; }
        else { sig.receivers.push(nodeName); el.classList.add('checked'); el.querySelector('input').checked = true; }
        refreshValidationStatus();
    }

    function updateSignal(field) {
        const sig = db.messages[activeMsgIndex].signals[activeSigIndex];
        if (field === 'comment') { sig.comment = document.getElementById('s_comment').value; refreshValidationStatus(); return; }
        if (field === 'mux') {
            const val = document.getElementById('s_mux').value;
            sig.muxType = val;
            sig.muxValue = val === 'm' ? 0 : null;
            openSignalEditor(activeMsgIndex, activeSigIndex);
            refreshValidationStatus();
            return;
        }
        if (field === 'muxval') { sig.muxValue = parseInt(document.getElementById('s_muxval').value, 10) || 0; refreshValidationStatus(); return; }
        const val = document.getElementById(`s_${field}`).value;
        sig[field] = val;
        if (field === 'start' || field === 'len') sig[field] = parseInt(val, 10) || 0;
        if (field === 'name') {
            sig.name = val.replace(/\s+/g, '_');
            renderTree();
            const el = document.getElementById(`tree_m_${activeMsgIndex}_s_${activeSigIndex}`);
            if (el) el.classList.add('active');
        }
        refreshValidationStatus();
    }

    /* ============================= OBJECT ATTRIBUTES TAB ============================= */
    function currentObjType() {
        if (activeType === 'node') return 'BU_';
        if (activeType === 'msg') return 'BO_';
        if (activeType === 'sig') return 'SG_';
        return '';
    }

    function renderObjAttrs() {
        const container = document.getElementById('content_objattrs');
        const objType = currentObjType();
        if (!objType) { container.innerHTML = ''; return; }
        const attrs = attrsContainerFor(objType);
        const defs = Object.keys(db.attrDefs).map(n => db.attrDefs[n]).filter(d => d.objectType === objType);

        let rows = '';
        defs.forEach(def => {
            const isSet = attrs[def.name] !== undefined;
            const value = isSet ? attrs[def.name] : def.defaultValue;
            let input = '';
            if (def.valueType === 'ENUM') {
                const opts = def.enumValues.map((v, i) => `<option value="${i}" ${value === i ? 'selected' : ''}>${escapeHtml(v)}</option>`).join('');
                input = `<select onchange="setObjAttr('${escapeHtml(def.name)}', this.value)">${opts}</select>`;
            } else if (def.valueType === 'STRING') {
                input = `<input type="text" value="${escapeHtml(String(value))}" onchange="setObjAttr('${escapeHtml(def.name)}', this.value)">`;
            } else {
                const step = def.valueType === 'FLOAT' ? 'any' : '1';
                const range = def.min !== def.max ? `min="${def.min}" max="${def.max}"` : '';
                input = `<input type="number" step="${step}" ${range} value="${value}" onchange="setObjAttr('${escapeHtml(def.name)}', this.value)">`;
            }
            const constraint = def.valueType === 'ENUM' ? `${def.enumValues.length} values`
                             : (def.valueType === 'STRING' ? '—'
                             : (def.min !== def.max ? `${def.min} … ${def.max}` : 'unrestricted'));
            rows += `<tr>
                <td style="font-family:var(--font-mono);">${escapeHtml(def.name)}</td>
                <td>${def.valueType}</td>
                <td style="color:var(--text-muted); font-size:0.75rem;">${escapeHtml(constraint)}</td>
                <td>${input}</td>
                <td>${isSet
                    ? `<span style="color:var(--accent-blue); font-size:0.72rem; font-weight:700;">SET</span> <button class="btn-sm" style="margin-left:6px;" onclick="resetObjAttr('${escapeHtml(def.name)}')">↩ Default</button>`
                    : `<span style="color:var(--text-muted); font-size:0.72rem;">default</span>`}</td>
            </tr>`;
        });

        const objLabel = objType === 'BU_' ? 'Node' : (objType === 'BO_' ? 'Message' : 'Signal');
        container.innerHTML = `
            <div class="editor-form" style="max-width: 900px;">
                <div class="editor-header">
                    <span>${objLabel} Attributes</span>
                    <button class="btn-sm primary" onclick="openAttrDefManager()">⚙ Attribute Definitions…</button>
                </div>
                ${defs.length === 0
                    ? `<p style="color:var(--text-muted); font-size:0.85rem;">No attribute definitions exist for object type ${objLabel}. Create one via "Attribute Definitions…".</p>`
                    : `<table class="data-table">
                        <thead><tr><th>Attribute</th><th width="70px">Type</th><th width="110px">Constraint</th><th>Value</th><th width="150px">State</th></tr></thead>
                        <tbody>${rows}</tbody>
                       </table>`}
                <p style="color:var(--text-muted); font-size:0.75rem; margin-top:12px;">Values shown in grey "default" state come from the attribute definition's default and are not written to the DBC. Editing a value sets it explicitly on this object (BA_ line on export).</p>
            </div>
        `;
    }

    function setObjAttr(defName, rawValue) {
        const def = db.attrDefs[defName];
        if (!def) return;
        const attrs = attrsContainerFor(currentObjType());
        let value;
        if (def.valueType === 'ENUM') value = parseInt(rawValue, 10) || 0;
        else if (def.valueType === 'STRING') value = rawValue;
        else {
            value = parseFloat(rawValue);
            if (!Number.isFinite(value)) { showToast('Value must be numeric.', 'error'); renderObjAttrs(); return; }
            if (def.valueType !== 'FLOAT') value = Math.round(value);
        }
        attrs[defName] = value;
        // Keep the Properties-page Cycle Time field in sync (PropsFromUserAttrs behavior).
        renderObjAttrs();
        runValidation();
    }

    function resetObjAttr(defName) {
        const attrs = attrsContainerFor(currentObjType());
        delete attrs[defName];
        renderObjAttrs();
        runValidation();
    }

    /* ============================= ATTRIBUTE DEFINITIONS MANAGER ============================= */

        const names = Object.keys(db.attrDefs);
        let rows = names.map(name => {
            const def = db.attrDefs[name];
            const objLabel = def.objectType === 'BU_' ? 'Node' : def.objectType === 'BO_' ? 'Message' : def.objectType === 'SG_' ? 'Signal' : 'Network';
            const detail = def.valueType === 'ENUM' ? escapeHtml(def.enumValues.join(', '))
                         : def.valueType === 'STRING' ? ''
                         : (def.min !== def.max ? `${def.min} … ${def.max}` : 'unrestricted');
            return `<tr>
                <td style="font-family:var(--font-mono);">${escapeHtml(name)}</td>
                <td>${objLabel}</td>
                <td>${def.valueType}</td>
                <td style="font-size:0.72rem; color:var(--text-muted); max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${detail}">${detail}</td>
                <td style="font-family:var(--font-mono);">${escapeHtml(displayAttrValue(def, def.defaultValue))}</td>
                <td style="white-space:nowrap;">
                    <button class="btn-sm" onclick="openAttrDefEditor('${escapeHtml(name)}')">Edit</button>
                    <button class="btn-sm danger" onclick="deleteAttrDef('${escapeHtml(name)}')">✕</button>
                </td>
            </tr>`;
        }).join('');

        openModal('Attribute Definitions',
            `${names.length === 0 ? '<p style="color:var(--text-muted);">No attribute definitions.</p>' : `
             <table class="data-table" style="margin-top:0;">
                <thead><tr><th>Name</th><th>Object</th><th>Type</th><th>Constraint / Values</th><th>Default</th><th width="110px"></th></tr></thead>
                <tbody>${rows}</tbody>
             </table>`}`,
            [
                { label: 'New Definition…', variant: 'primary', onClick: () => openAttrDefEditor(null) },
                { label: 'Close', onClick: () => { closeModal(); if (document.getElementById('content_objattrs').classList.contains('active')) renderObjAttrs(); } }
            ], true);
    }

            [
                { label: 'Back', onClick: openAttrDefManager },
                { label: existingName ? 'Save Changes' : 'Create', variant: 'primary', onClick: () => saveAttrDef(existingName) }
            ], true);
