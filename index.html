    function adTypeChanged() {
        const t = document.getElementById('ad_type').value;
        document.getElementById('ad_min_wrap').style.display = (t === 'STRING' || t === 'ENUM') ? 'none' : 'block';
        document.getElementById('ad_max_wrap').style.display = (t === 'STRING' || t === 'ENUM') ? 'none' : 'block';
        document.getElementById('ad_enum_wrap').style.display = t === 'ENUM' ? 'block' : 'none';
    }

    function saveAttrDef(existingName) {
        const errEl = document.getElementById('ad_err');
        const name = existingName || document.getElementById('ad_name').value.trim();
        if (!name) { errEl.innerText = 'Name cannot be empty.'; return; }
        if (!existingName && db.attrDefs[name]) { errEl.innerText = 'An attribute with this name already exists.'; return; }

        const valueType = document.getElementById('ad_type').value;
        const objectType = document.getElementById('ad_obj').value;
        const def = { name, objectType, valueType, min: 0, max: 0, enumValues: [], defaultValue: valueType === 'STRING' ? '' : 0 };

        if (valueType === 'ENUM') {
            def.enumValues = document.getElementById('ad_enum').value.split(',').map(v => v.trim()).filter(Boolean);
            if (def.enumValues.length === 0) { errEl.innerText = 'ENUM needs at least one value.'; return; }
        } else if (valueType !== 'STRING') {
            def.min = parseFloat(document.getElementById('ad_min').value) || 0;
            def.max = parseFloat(document.getElementById('ad_max').value) || 0;
            if (def.min > def.max) { errEl.innerText = 'Minimum cannot exceed maximum.'; return; }
        }

        const rawDefault = document.getElementById('ad_default').value.trim();
        if (valueType === 'STRING') def.defaultValue = rawDefault;
        else if (valueType === 'ENUM') {
            let idx = def.enumValues.indexOf(rawDefault);
            if (idx < 0) idx = parseInt(rawDefault, 10);
            if (!Number.isFinite(idx) || idx < 0 || idx >= def.enumValues.length) idx = 0;
            def.defaultValue = idx;
        } else {
            const v = parseFloat(rawDefault);
            def.defaultValue = Number.isFinite(v) ? (valueType === 'FLOAT' ? v : Math.round(v)) : 0;
            if (def.min !== def.max && (def.defaultValue < def.min || def.defaultValue > def.max)) { errEl.innerText = `Default must be within ${def.min} … ${def.max}.`; return; }
        }

        // If object type changed on an existing definition, stale assignments on
        // other object kinds would export invalid BA_ lines — clean them up.
        if (existingName && db.attrDefs[existingName].objectType !== objectType) {
            if (objectType !== '') delete db.netAttrs[name];
            if (objectType !== 'BU_') Object.keys(db.nodeAttrs).forEach(n => delete db.nodeAttrs[n][name]);
            if (objectType !== 'BO_') db.messages.forEach(m => delete m.attrs[name]);
            if (objectType !== 'SG_') db.messages.forEach(m => m.signals.forEach(s => delete s.attrs[name]));
        }

        db.attrDefs[name] = def;
        runValidation();
        showToast(existingName ? `Attribute '${name}' updated.` : `Attribute '${name}' created.`, 'success');
        openAttrDefManager();
    }

    function deleteAttrDef(name) {
        openModal('Delete Attribute Definition',
            `<p>Delete attribute <b>${escapeHtml(name)}</b>? All assignments of this attribute on every node, message, and signal will also be removed.</p>`,
            [
                { label: 'Cancel', onClick: openAttrDefManager },
                { label: 'Delete', variant: 'danger', onClick: () => {
                    delete db.attrDefs[name];
                    delete db.netAttrs[name];
                    Object.keys(db.nodeAttrs).forEach(n => delete db.nodeAttrs[n][name]);
                    db.messages.forEach(m => { delete m.attrs[name]; m.signals.forEach(s => delete s.attrs[name]); });
                    runValidation();
                    showToast(`Attribute '${name}' deleted.`, 'success');
                    openAttrDefManager();
                } }
            ]);
    }

    /* ============================= VALUE TABLE EDITOR ============================= */
    function renderValueTable() {
        const sig = db.messages[activeMsgIndex].signals[activeSigIndex];
        const tbody = document.getElementById('valTableBody');
        tbody.innerHTML = '';

        Object.keys(sig.valTable).forEach(raw => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="number" value="${escapeHtml(raw)}" onchange="updateValueKey(this, '${escapeHtml(raw)}')"></td>
                <td><input type="text" value="${escapeHtml(sig.valTable[raw])}" onchange="updateValueDesc('${escapeHtml(raw)}', this.value)"></td>
                <td><button class="btn-sm danger" onclick="deleteValue('${escapeHtml(raw)}')">X</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function addValueTableRow() {
        const sig = db.messages[activeMsgIndex].signals[activeSigIndex];
        let nextKey = 0;
        while (sig.valTable[nextKey] !== undefined) nextKey++;
        sig.valTable[nextKey] = 'New_State';
        renderValueTable();
    }

    function updateValueKey(input, oldKey) {
        const sig = db.messages[activeMsgIndex].signals[activeSigIndex];
        const newKey = input.value;
        if (newKey !== oldKey) {
            sig.valTable[newKey] = sig.valTable[oldKey];
            delete sig.valTable[oldKey];
            renderValueTable();
        }
    }

    function updateValueDesc(key, desc) { db.messages[activeMsgIndex].signals[activeSigIndex].valTable[key] = desc; }
    function deleteValue(key) { delete db.messages[activeMsgIndex].signals[activeSigIndex].valTable[key]; renderValueTable(); }

    /* ============================= LAYOUT MATRIX (with correct LSB/MSB per byte order) ============================= */
    function renderLayoutMatrix() {
        const msg = db.messages[activeMsgIndex];
        const mx = document.getElementById('layoutMatrix');
        mx.innerHTML = '';

        mx.appendChild(Object.assign(document.createElement('div'), { className: 'matrix-cell matrix-header' }));
        for (let b = 7; b >= 0; b--) {
            const div = document.createElement('div');
            div.className = 'matrix-cell matrix-header'; div.innerText = b;
            mx.appendChild(div);
        }

        let bitOwners = {};
        msg.signals.forEach((sig, sIdx) => {
            const color = sigColors[sIdx % sigColors.length];
            // Shared helper enforces the DBC convention:
            //   @1 = Intel / little-endian  -> start bit is the LSB, bit numbers count UP linearly.
            //   @0 = Motorola / big-endian  -> start bit is the MSB, bits zig-zag down through
            //        the DBC numbering (…, 9, 8 -> jump +15 -> 23, 22, …).
            const bits = computeSignalBits(sig);

            // Intel ('1'): first traversed bit (the start bit) is the LSB, last is the MSB.
            // Motorola ('0'): first traversed bit (the start bit) is the MSB, last is the LSB.
            bits.forEach((b, index) => {
                if (!bitOwners[b]) bitOwners[b] = [];
                const isFirst = index === 0;
                const isLast = index === sig.len - 1;
                bitOwners[b].push({
                    name: sig.name,
                    color: color,
                    len: sig.len,
                    muxType: sig.muxType,
                    muxValue: sig.muxValue,
                    isLsb: sig.order === '1' ? isFirst : isLast,
                    isMsb: sig.order === '1' ? isLast : isFirst
                });
            });
        });

        for (let byte = 0; byte < msg.dlc; byte++) {
            const bDiv = document.createElement('div');
            bDiv.className = 'matrix-cell matrix-byte';
            bDiv.innerText = `Byte ${byte}`;
            mx.appendChild(bDiv);

            for (let bitOffset = 7; bitOffset >= 0; bitOffset--) {
                const bitIndex = (byte * 8) + bitOffset;
                const cell = document.createElement('div');
                cell.className = 'matrix-cell';

                cell.innerHTML = `<div class="bit-num">${bitIndex}</div>`;

                if (bitOwners[bitIndex]) {
                    cell.classList.add('has-signal');
                    const owners = bitOwners[bitIndex];
                    const isOverlap = owners.length > 1 && owners.some((o, i) => owners.some((o2, j) => i < j && ((o.muxType !== 'm' && o2.muxType !== 'm') || (o.muxType === 'm' && o2.muxType === 'm' && o.muxValue === o2.muxValue))));

                    owners.forEach(owner => {
                        const sBlk = document.createElement('div');
                        sBlk.className = `sig-block ${isOverlap ? 'overlap' : ''}`;
                        sBlk.title = owner.name;

                        if (!isOverlap) {
                            sBlk.style.backgroundColor = owner.color;
                            let innerHtml = `<span style="z-index: 2; position: relative;">${escapeHtml(owner.name)}</span>`;
                            if (owner.len > 1) {
                                if (owner.isLsb) innerHtml += `<div class="edge-badge">LSB</div>`;
                                if (owner.isMsb) innerHtml += `<div class="edge-badge">MSB</div>`;
                            } else {
                                if (owner.isLsb) innerHtml += `<div class="edge-badge" style="font-size:0.4rem">1-BIT</div>`;
                            }
                            if (owner.muxType === 'M') innerHtml += `<div class="mux-badge">M</div>`;
                            else if (owner.muxType === 'm') innerHtml += `<div class="mux-badge">m${owner.muxValue}</div>`;
                            sBlk.innerHTML = innerHtml;
                        } else {
                            sBlk.innerText = 'OVERLAP';
                        }
                        cell.appendChild(sBlk);
                    });
                }
                mx.appendChild(cell);
            }
        }

        const legendCont = document.getElementById('layoutLegend');
        legendCont.innerHTML = '';
        if (msg.signals.length === 0) {
            legendCont.innerHTML = '<span style="color:var(--text-muted)">No signals defined in this message.</span>';
        } else {
            msg.signals.forEach((sig, sIdx) => {
                const color = sigColors[sIdx % sigColors.length];
                const span = document.createElement('span');
                span.className = 'legend-item';
                span.innerHTML = `<div class="legend-color" style="background:${color}"></div> ${escapeHtml(sig.name)}`;
                legendCont.appendChild(span);
            });
        }
    }

    /* ============================= FILE GENERATION / EXPORT ============================= */
    function buildDbcText() {
        let out = [];
        out.push(`VERSION "${db.version || ''}"\n`);
        out.push('NS_ :\n\tNS_DESC_\n\tCM_\n\tBA_DEF_\n\tBA_\n\tVAL_\n\tCAT_DEF_\n\tCAT_\n\tFILTER\n\tBA_DEF_DEF_\n\tEV_DATA_\n\tENVVAR_DATA_\n\tSGTYPE_\n\tSGTYPE_VAL_\n\tBA_DEF_SGTYPE_\n\tBA_SGTYPE_\n\tSIG_TYPE_REF_\n\tVAL_TABLE_\n\tSIG_GROUP_\n\tSIG_VALTYPE_\n\tSIGTYPE_VALTYPE_\n\tBO_TX_BU_\n\tBA_DEF_REL_\n\tBA_REL_\n\tBA_DEF_DEF_REL_\n\tBU_SG_REL_\n\tBU_EV_REL_\n\tBU_BO_REL_\n\tSG_MUL_VAL_\n');
        out.push('BS_:\n');
        out.push(`BU_: ${db.nodes.join(' ')}\n`);

        if (db.valueTablesRaw.length > 0) {
            out.push('');
            db.valueTablesRaw.forEach(l => out.push(l));
        }
        out.push('');

        db.messages.forEach(msg => {
            const idStr = msgExportId(msg);

            out.push(`BO_ ${idStr} ${msg.name}: ${msg.dlc} ${msg.node || 'Vector__XXX'}`);

            msg.signals.forEach(sig => {
                const muxToken = sig.muxType === 'M' ? ' M' : (sig.muxType === 'm' ? ` m${sig.muxValue}` : '');
                const receivers = sig.receivers.length > 0 ? sig.receivers.join(',') : 'Vector__XXX';
                out.push(` SG_ ${sig.name}${muxToken} : ${sig.start}|${sig.len}@${sig.order}${sig.type} (${sig.factor},${sig.offset}) [${sig.min}|${sig.max}] "${sig.unit}" ${receivers}`);
            });
            out.push('');
        });

        // Comments
        db.nodes.forEach(n => { if (db.nodeComments[n]) out.push(`CM_ BU_ ${n} "${db.nodeComments[n].replace(/"/g, "'")}";`); });
        db.messages.forEach(msg => {
            const idStr = msgExportId(msg);
            if (msg.comment) out.push(`CM_ BO_ ${idStr} "${msg.comment.replace(/"/g, "'")}";`);
            msg.signals.forEach(sig => { if (sig.comment) out.push(`CM_ SG_ ${idStr} ${sig.name} "${sig.comment.replace(/"/g, "'")}";`); });
        });

        // Attribute definitions, defaults, and assignments (proper DBC section order:
        // BA_DEF_ ... BA_DEF_REL_ (raw) ... BA_DEF_DEF_ ... BA_ ... then VAL_).
        const defNames = Object.keys(db.attrDefs);
        if (defNames.length > 0 || db.attrRaw.length > 0) out.push('');

        defNames.forEach(name => {
            const def = db.attrDefs[name];
            const objTok = def.objectType ? def.objectType + ' ' : '';
            if (def.valueType === 'ENUM') {
                out.push(`BA_DEF_ ${objTok}"${name}" ENUM ${def.enumValues.map(v => `"${v}"`).join(',')};`);
            } else if (def.valueType === 'STRING') {
                out.push(`BA_DEF_ ${objTok}"${name}" STRING ;`);
            } else {
                out.push(`BA_DEF_ ${objTok}"${name}" ${def.valueType} ${def.min} ${def.max};`);
            }
        });

        // Preserved relation / env-var attribute lines (round-trip verbatim)
        db.attrRaw.forEach(l => out.push(l));

        defNames.forEach(name => {
            const def = db.attrDefs[name];
            out.push(`BA_DEF_DEF_ "${name}" ${exportAttrValue(def, def.defaultValue, true)};`);
        });

        // Assignments — network, then nodes, then messages, then signals.
        Object.keys(db.netAttrs).forEach(name => {
            const def = db.attrDefs[name];
            if (def) out.push(`BA_ "${name}" ${exportAttrValue(def, db.netAttrs[name], false)};`);
        });
        Object.keys(db.nodeAttrs).forEach(nodeName => {
            if (!db.nodes.includes(nodeName)) return;
            Object.keys(db.nodeAttrs[nodeName]).forEach(name => {
                const def = db.attrDefs[name];
                if (def) out.push(`BA_ "${name}" BU_ ${nodeName} ${exportAttrValue(def, db.nodeAttrs[nodeName][name], false)};`);
            });
        });
        db.messages.forEach(msg => {
            const idStr = msgExportId(msg);
            Object.keys(msg.attrs).forEach(name => {
                const def = db.attrDefs[name];
                if (def) out.push(`BA_ "${name}" BO_ ${idStr} ${exportAttrValue(def, msg.attrs[name], false)};`);
            });
            msg.signals.forEach(sig => {
                Object.keys(sig.attrs).forEach(name => {
                    const def = db.attrDefs[name];
                    if (def) out.push(`BA_ "${name}" SG_ ${idStr} ${sig.name} ${exportAttrValue(def, sig.attrs[name], false)};`);
                });
            });
        });

        // Value tables (inline VAL_ per signal)
        out.push('');
        db.messages.forEach(msg => {
            const idStr = msgExportId(msg);

            msg.signals.forEach(sig => {
                const keys = Object.keys(sig.valTable);
                if (keys.length > 0) {
                    let valStr = `VAL_ ${idStr} ${sig.name} `;
                    keys.sort((a, b) => b - a).forEach(k => { valStr += `${k} "${sig.valTable[k]}" `; });
                    valStr += ';';
                    out.push(valStr);
                }
            });
        });

        return out.join('\n');
    }

    function requestExport() {
        if (db.messages.length === 0 && db.nodes.length === 0) { showToast('Database is empty — nothing to export.', 'error'); return; }
        const problems = runValidation();
        const errors = problems.filter(p => p.severity === 'error');
        if (errors.length > 0) {
            openModal('Cannot Save — Validation Errors',
                `<p>The database has <b>${errors.length} error(s)</b> that must be resolved before exporting a valid DBC file.</p>
                 <div style="margin-top:10px; max-height:220px; overflow-y:auto; border:1px solid var(--border-color); border-radius:4px;">
                    ${errors.slice(0, 25).map(e => `<div class="problem-row error" style="cursor:default;"><span class="problem-icon">⛔</span><span>${escapeHtml(e.message)}</span></div>`).join('')}
                 </div>`,
                [
                    { label: 'Go to Problems', onClick: () => { closeModal(); document.getElementById('problemsPanel').classList.add('open'); } },
                    { label: 'Export Anyway', variant: 'danger', onClick: () => { closeModal(); doExport(); } }
                ]);
            return;
        }
        doExport();
    }

    function doExport() {
        // "Save As" dialog: let the user rename the file before the download starts.
        const suggested = loadedFileName ? loadedFileName.replace(/\.dbc$/i, '') : 'Network_DB';
        openModal('Save Database As',
            `<label style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;font-weight:600;">File Name</label>
             <div style="display:flex; align-items:center; gap:6px;">
                <input type="text" id="exportNameInput" value="${escapeHtml(suggested)}" style="flex:1;">
                <span style="font-family:var(--font-mono); color:var(--text-muted); margin-top:8px;">.dbc</span>
             </div>
             <div class="modal-error-text" id="exportNameErr"></div>`,
            [
                { label: 'Cancel', onClick: closeModal },
                { label: 'Save', variant: 'primary', onClick: () => {
                    const raw = document.getElementById('exportNameInput').value.trim().replace(/\.dbc$/i, '');
                    if (!raw) { document.getElementById('exportNameErr').innerText = 'File name cannot be empty.'; return; }
                    if (/[\\/:*?"<>|]/.test(raw)) { document.getElementById('exportNameErr').innerText = 'File name contains invalid characters: \\ / : * ? " < > |'; return; }
                    closeModal();
                    downloadDbc(raw + '.dbc');
                } }
            ]);
        setTimeout(() => {
            const el = document.getElementById('exportNameInput');
            if (el) {
                el.focus(); el.select();
                el.addEventListener('keydown', (ev) => {
                    if (ev.key === 'Enter') { ev.preventDefault(); document.querySelector('#modalFooter .modal-btn.primary').click(); }
                });
            }
        }, 50);
    }

    function downloadDbc(fileName) {
        const text = buildDbcText();
        const blob = new Blob([text], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
        loadedFileName = fileName;
        document.getElementById('fileBadge').innerText = fileName;
        if (activeDbIndex >= 0 && dbFiles[activeDbIndex]) { dbFiles[activeDbIndex].name = fileName; renderDbSelector(); }
        showToast(`Saved as ${fileName}`, 'success');
    }

    /* ============================= MATLAB EXPORT =============================
       Ported from the standalone "Matlab CAN data directory" tool. The flow is
       identical: search & select messages -> output name -> generate script.
       The generated .m file layout matches the golden Ecotron sample:
       function header, if(255==type) list block, switch/case per message,
       ECOCAN struct fields, interval taken from the GenMsgCycleTime attribute
       (-1 when unassigned), per-field name/units/start_bit/bit_length/
       byte_order/data_type/scale/offset plus multiplex_type/multiplex_value,
       and the independent container exported with its reserved 0x40000000 id.
       One deliberate difference: byte_order follows the correct DBC convention
       (@1 = LITTLE_ENDIAN / Intel, @0 = BIG_ENDIAN / Motorola). The standalone
       tool had this mapping inverted. */
    let matlabSelected = new Set();
    let matlabSearchTimeout = null;
    const MATLAB_DISPLAY_LIMIT = 500;

    // Message dictionary keyed by name — last definition wins, matching the
    // standalone tool's `parsedDbcData[name] = currentMsg` overwrite behavior.
    function matlabMsgDict() {
        const dict = {};
        db.messages.forEach(m => { dict[m.name] = m; });
        return dict;
    }

    function matlabAllNames() {
        const seen = new Set();
        const names = [];
        db.messages.forEach(m => { if (!seen.has(m.name)) { seen.add(m.name); names.push(m.name); } });
        return names;
    }

    function openMatlabExport(preserveSelection) {
        if (db.messages.length === 0) { showToast('Load or create a database with messages first.', 'error'); return; }
        if (!preserveSelection) matlabSelected = new Set();

        openModal('Generate MATLAB Script',
            `<label class="ml-label">1. Search &amp; Select Messages</label>
             <input type="text" id="mlSearch" placeholder="Type to search available messages..." oninput="mlHandleSearch()" style="margin-top:0;">
             <div class="ml-actions">
                <button class="btn-sm primary" onclick="mlSelectAllVisible()">Select All Visible</button>
                <button class="btn-sm" onclick="mlClearAll()">Clear Selections</button>
             </div>
             <div class="ml-list" id="mlList"></div>
             <span class="ml-status" id="mlStatus">0 messages selected.</span>
             <label class="ml-label" style="margin-top:16px;">2. Output Configuration</label>
             <input type="text" id="mlOutputName" value="Ev_Demo_M.m" style="margin-top:0;">`,
            [
                { label: 'Cancel', onClick: closeModal },
                { label: 'Generate MATLAB Script', variant: 'primary', onClick: generateMatlabScript }
            ], true);

        renderMatlabList();
    }

    function mlHandleSearch() {
        clearTimeout(matlabSearchTimeout);
        matlabSearchTimeout = setTimeout(renderMatlabList, 250);
    }

    function renderMatlabList() {
        const listEl = document.getElementById('mlList');
        if (!listEl) return;
        const query = (document.getElementById('mlSearch').value || '').toLowerCase();
        const allNames = matlabAllNames();
        let filtered = allNames;
        if (query !== '') filtered = allNames.filter(name => name.toLowerCase().includes(query));

        const displayData = filtered.slice(0, MATLAB_DISPLAY_LIMIT);
        let htmlStr = '';
        displayData.forEach(name => {
            const isChecked = matlabSelected.has(name) ? 'checked' : '';
            htmlStr += `<div class="ml-item"><input type="checkbox" id="chk_ml_${escapeHtml(name)}" value="${escapeHtml(name)}" onchange="mlToggleSelection(this)" ${isChecked}><label for="chk_ml_${escapeHtml(name)}">${escapeHtml(name)}</label></div>`;
        });

        if (displayData.length === 0) htmlStr = `<div class="ml-empty">No messages match your search.</div>`;
        listEl.innerHTML = htmlStr;

        document.getElementById('mlStatus').innerHTML =
            `Showing ${filtered.length > MATLAB_DISPLAY_LIMIT ? 'top ' + MATLAB_DISPLAY_LIMIT + ' of ' + filtered.length : filtered.length} matches. | <b>${matlabSelected.size} selected.</b>`;
    }

    function mlToggleSelection(checkbox) {
        if (checkbox.checked) matlabSelected.add(checkbox.value);
        else matlabSelected.delete(checkbox.value);
        mlUpdateStatus();
    }

    function mlSelectAllVisible() {
        document.querySelectorAll('#mlList input[type="checkbox"]').forEach(chk => { chk.checked = true; matlabSelected.add(chk.value); });
        mlUpdateStatus();
    }

    function mlClearAll() {
        matlabSelected.clear();
        document.querySelectorAll('#mlList input[type="checkbox"]').forEach(chk => { chk.checked = false; });
        mlUpdateStatus();
    }

    function mlUpdateStatus() {
        const statusEl = document.getElementById('mlStatus');
        if (!statusEl) return;
        const text = statusEl.innerHTML.split('|')[0];
        statusEl.innerHTML = `${text}| <b>${matlabSelected.size} selected.</b>`;
    }

    function generateMatlabScript() {
        const dict = matlabMsgDict();
        if (Object.keys(dict).length === 0) return;

        let targetMsgs = Array.from(matlabSelected);
        const requestedName = document.getElementById('mlOutputName').value;

        if (targetMsgs.length === 0) {
            // Same fallback as the standalone tool's confirm(): offer to convert everything.
            openModal('Convert All Messages?',
                `<p>You haven't selected any specific messages.</p>
                 <p style="margin-top:8px;">Do you want to convert <b>ALL ${matlabAllNames().length} parsed messages</b> in the entire database?</p>`,
                [
                    { label: 'Back', onClick: () => { openMatlabExport(true); const el = document.getElementById('mlOutputName'); if (el) el.value = requestedName; } },
                    { label: 'Convert All', variant: 'primary', onClick: () => { doGenerateMatlab(matlabAllNames(), requestedName); } }
                ]);
            return;
        }
        doGenerateMatlab(targetMsgs, requestedName);
    }

    function doGenerateMatlab(targetMsgs, requestedName) {
        const dict = matlabMsgDict();

        // --- 1. Get and format the filename/function name first ---
        let rawInputName = (requestedName || '').trim() || 'Ev_Demo_M';
        // Remove '.m' if the user accidentally typed it, so we get a clean function name
        let functionName = rawInputName.endsWith('.m') ? rawInputName.slice(0, -2) : rawInputName;
        // Ensure the actual downloaded file has the .m extension
        let finalFilename = functionName + '.m';

        const structName = 'ECOCAN';
        let outStr = [];

        // --- 2. Inject the dynamic functionName here ---
        outStr.push(`function msg = ${functionName}(msgname,type)`);

        outStr.push(`  if(255==type)`);
        outStr.push(`  msg = struct;`);
        outStr.push(`  msg.num=${targetMsgs.length};`);
        outStr.push(`  msg.list= cell(1, msg.num);`);

        targetMsgs.forEach((msgName, idx) => outStr.push(`  msg.list{${idx + 1}}='${msgName}';`));

        outStr.push(`  else `);
        outStr.push(`  msg = struct;`);
        outStr.push(`  switch msgname `);

        targetMsgs.forEach((msgName, idx) => {
            const msg = dict[msgName];
            if (!msg) return;
            // Independent container: raw id 0xC0000000 with the extended-flag
            // bit (31) stripped -> 0x40000000, per the golden Ecotron sample.
            const idHex = msg.isIndependent ? '40000000' : msg.id.toString(16).toUpperCase();
            const idext = msg.isExt ? 'EXTENDED' : 'STANDARD';
            // interval comes from an explicit GenMsgCycleTime assignment; -1 when unassigned.
            const cyc = msg.attrs && msg.attrs['GenMsgCycleTime'] !== undefined ? msg.attrs['GenMsgCycleTime'] : -1;

            outStr.push(`%%`);
            outStr.push(`%Network Node:${msg.node}`);
            outStr.push(`%Message Name:${msgName}`);
            outStr.push(`%Message Number:${idx + 1}`);
            outStr.push(`case '${msgName}'`);

            outStr.push(`    ${structName}.${msgName} = struct;`);
            outStr.push(`    ${structName}.${msgName}.name = '${msgName}';`);
            outStr.push(`    ${structName}.${msgName}.description = '${msgName}';`);
            outStr.push(`    ${structName}.${msgName}.protocol  = 'ECOCAN';`);
            outStr.push(`    ${structName}.${msgName}.id = hex2dec('${idHex}');`);
            outStr.push(`    ${structName}.${msgName}.idext = '${idext}';`);
            outStr.push(`    ${structName}.${msgName}.payload_size =${msg.dlc};`);
            outStr.push(`    ${structName}.${msgName}.interval =${cyc};\n`);

            msg.signals.forEach((sig, sIdx) => {
                // Correct DBC convention: @1 = Intel/little-endian, @0 = Motorola/big-endian.
                const byteOrder = sig.order === '1' ? 'LITTLE_ENDIAN' : 'BIG_ENDIAN';
                const dataType = sig.type === '+' ? 'UNSIGNED' : 'SIGNED';
                const scale = parseFloat(sig.factor);
                const offset = parseFloat(sig.offset);
                const muxType = sig.muxType === 'M' ? 'Multiplexer' : (sig.muxType === 'm' ? 'Multiplexed' : 'Standard');
                const muxValue = sig.muxType === 'm' ? sig.muxValue : 0;

                outStr.push(`    ${structName}.${msgName}.fields{${sIdx + 1}}.name = '${sig.name}';`);
                outStr.push(`    ${structName}.${msgName}.fields{${sIdx + 1}}.units = '${sig.unit}';`);
                outStr.push(`    ${structName}.${msgName}.fields{${sIdx + 1}}.start_bit = ${sig.start};`);
                outStr.push(`    ${structName}.${msgName}.fields{${sIdx + 1}}.bit_length = ${sig.len};`);
                outStr.push(`    ${structName}.${msgName}.fields{${sIdx + 1}}.byte_order = '${byteOrder}';`);
                outStr.push(`    ${structName}.${msgName}.fields{${sIdx + 1}}.data_type = '${dataType}';`);
                outStr.push(`    ${structName}.${msgName}.fields{${sIdx + 1}}.scale = ${scale};`);
                outStr.push(`    ${structName}.${msgName}.fields{${sIdx + 1}}.offset = ${offset};`);
                outStr.push(`    ${structName}.${msgName}.fields{${sIdx + 1}}.multiplex_type = '${muxType}';`);
                outStr.push(`    ${structName}.${msgName}.fields{${sIdx + 1}}.multiplex_value = ${muxValue};\n`);
            });
            outStr.push('');  // extra blank line after each message block (golden format)
        });

        outStr.push(`  end`);
        outStr.push(`  try`);
        outStr.push(`    msg = ${structName}.(msgname);`);
        outStr.push(`  catch`);
        outStr.push(`  end`);
        outStr.push(`end`);
        outStr.push(`end`);
        outStr.push('');

        // --- 3. Use the finalFilename for the download ---
        const blob = new Blob([outStr.join('\n')], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = finalFilename;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);

        closeModal();
        showToast(`MATLAB script generated: ${finalFilename} (${targetMsgs.length} message(s))`, 'success');
    }
</script>

    if (typeof serialInitUI === 'function') serialInitUI();

/* ============================= DBC DECODE MAPS ============================= */
function traceRebuildDbMaps() {
    // Decode against EVERY loaded DBC file, not just the one active in the
    // Database explorer. On an ID collision between files, the active database
    // wins, then earlier-loaded files take precedence.
    TR.idMap.clear();
    const entries = (typeof allDbEntries === 'function') ? allDbEntries().slice() : [{ db }];
    if (typeof activeDbIndex !== 'undefined' && activeDbIndex > 0 && activeDbIndex < entries.length) {
        entries.unshift(entries.splice(activeDbIndex, 1)[0]);
    }
    entries.forEach(e => e.db.messages.forEach(msg => {
        if (msg.isIndependent) return;
        const key = (msg.isExt ? 'X' : 'S') + msg.id;
        if (!TR.idMap.has(key)) TR.idMap.set(key, msg);
    }));
    const el = document.getElementById('trDbInfo');
    if (el) el.innerHTML = `DBC: <b style="color:var(--text-main);">${TR.idMap.size}</b> decodable messages from <b style="color:var(--text-main);">${entries.length}</b> file(s)`;
    trTxPopulateMsgList();
}

function traceLookupMsg(id, ext) {
    // Try exact ext flag first, then the other — some logs lose the ext marker.
    return TR.idMap.get((ext ? 'X' : 'S') + id) || TR.idMap.get((ext ? 'S' : 'X') + id) || null;
}

/* ============================= SIGNAL DECODE / ENCODE =============================
   Bit mapping contract from computeSignalBits (shared with the database tool):
     Intel (@1):    bits[0] = LSB … bits[len-1] = MSB
     Motorola (@0): bits[0] = MSB … bits[len-1] = LSB
   So raw-value bit k (k = 0 is LSB) lives at:
     Intel:    bits[k]
     Motorola: bits[len-1-k]                                                     */
function rawBitPositions(sig) {
    const bits = computeSignalBits(sig);
    return sig.order === '1' ? bits : bits.slice().reverse(); // index k -> position of raw bit k
}

function traceDecodeRaw(sig, data) {
    const pos = rawBitPositions(sig);
    let raw = 0n;
    for (let k = 0; k < pos.length; k++) {
        const p = pos[k];
        const byte = p >> 3, bit = p & 7;
        if (byte < data.length && (data[byte] >> bit) & 1) raw |= (1n << BigInt(k));
    }
    if (sig.type === '-') { // sign extend
        const signBit = 1n << BigInt(sig.len - 1);
        if (raw & signBit) raw -= (1n << BigInt(sig.len));
    }
    return raw;
}

function traceDecodeFrame(msg, data) {
    const rows = [];
    let muxVal = null;
    const muxor = msg.signals.find(s => s.muxType === 'M');
    if (muxor) muxVal = Number(traceDecodeRaw(muxor, data));

    msg.signals.forEach(sig => {
        if (sig.muxType === 'm' && sig.muxValue !== muxVal) return; // inactive mux branch
        const raw = traceDecodeRaw(sig, data);
        const rawNum = Number(raw);
        const phys = rawNum * parseFloat(sig.factor) + parseFloat(sig.offset);
        const vt = sig.valTable[String(rawNum)];
        rows.push({
            name: sig.name, raw: rawNum,
            phys: Number.isInteger(phys) ? phys : +phys.toFixed(4),
            unit: sig.unit, vt: vt || null,
            mux: sig.muxType === 'M' ? 'M' : (sig.muxType === 'm' ? 'm' + sig.muxValue : '')
        });
    });
    return rows;
}

function traceEncodeFrame(msg, physByName) {
    const data = new Uint8Array(Math.max(msg.dlc, 1));
    let muxVal = null;
    const muxor = msg.signals.find(s => s.muxType === 'M');
    if (muxor && physByName[muxor.name] !== undefined) {
        muxVal = Math.round((physByName[muxor.name] - parseFloat(muxor.offset)) / parseFloat(muxor.factor));
    }
    msg.signals.forEach(sig => {
        if (sig.muxType === 'm' && sig.muxValue !== muxVal) return;
        const phys = physByName[sig.name];
        if (phys === undefined || !Number.isFinite(phys)) return;
        const factor = parseFloat(sig.factor) || 1;
        let raw = BigInt(Math.round((phys - parseFloat(sig.offset)) / factor));
        const maxRaw = sig.type === '+' ? (1n << BigInt(sig.len)) - 1n : (1n << BigInt(sig.len - 1)) - 1n;
        const minRaw = sig.type === '+' ? 0n : -(1n << BigInt(sig.len - 1));
        if (raw > maxRaw) raw = maxRaw;
        if (raw < minRaw) raw = minRaw;
        if (raw < 0n) raw += (1n << BigInt(sig.len)); // two's complement
        const pos = rawBitPositions(sig);
        for (let k = 0; k < pos.length; k++) {
            const p = pos[k];
            const byte = p >> 3, bit = p & 7;
            if (byte >= data.length) continue;
            if ((raw >> BigInt(k)) & 1n) data[byte] |= (1 << bit);
            else data[byte] &= ~(1 << bit);
        }
    });
    return Array.from(data);
}

/* ============================= FRAME INGESTION ============================= */
function traceOnFrame(f) {
    // f: { t (seconds float), id, ext, dlc, data:[], dir:'rx'|'tx' }
    if (TR.t0 === null) TR.t0 = f.t;
    TR.frameCount++;
    if (TR.mode === 'fixed') traceFixedUpdate(f);
    else { TR.pendingScroll.push(f); traceScheduleFlush(); }
    if (typeof plotterOnFrame === 'function') plotterOnFrame(f);
    traceUpdateFooter();
}

function traceScheduleFlush() {
    if (TR.rafScheduled) return;
    TR.rafScheduled = true;
    requestAnimationFrame(() => { TR.rafScheduled = false; traceFlushScroll(); });
}

function traceHexData(data, dlc) { return data.slice(0, dlc).map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' '); }

function traceRowVisible(id, name) {
    const filter = (document.getElementById('trFilter').value || '').toLowerCase();
    const dbcOnly = document.getElementById('trDbcOnly').checked;
    if (dbcOnly && !name) return false;
    if (!filter) return true;
    return id.toString(16).toLowerCase().includes(filter) || (name && name.toLowerCase().includes(filter));
}

/* --- Fixed mode: one live-updating row per ID --- */
function traceFixedUpdate(f) {
    const key = (f.ext ? 'X' : 'S') + f.id;
    const dbMsg = traceLookupMsg(f.id, f.ext);
    let row = TR.fixedRows.get(key);
    if (!row) {
        row = { count: 0, lastT: f.t, el: null, sigEl: null };
        TR.fixedRows.set(key, row);
        const tr = document.createElement('tr');
        tr.className = 'tr-row';
        tr.onclick = () => traceToggleExpandFixed(key);
        document.getElementById('trBody').appendChild(tr);
        row.el = tr;
        const sigTr = document.createElement('tr');
        sigTr.className = 'tr-sig-row';
        sigTr.style.display = 'none';
        sigTr.innerHTML = '<td colspan="8"></td>';
        document.getElementById('trBody').appendChild(sigTr);
        row.sigEl = sigTr;
    }
    const delta = row.count > 0 ? ((f.t - row.lastT) * 1000).toFixed(1) : '—';
    row.count++;
    row.lastT = f.t;
    row.frame = f;
    row.dbMsg = dbMsg;

    const name = dbMsg ? dbMsg.name : null;
    row.el.style.display = traceRowVisible(f.id, name) ? '' : 'none';
    row.sigEl.style.display = (row.el.style.display === '' && TR.expandedFixed.has(key)) ? '' : 'none';

    const caretHtml = dbMsg ? `<span class="tr-caret" onclick="event.stopPropagation(); traceToggleExpandFixed('${key}')" title="Show decoded signals">${TR.expandedFixed.has(key) ? '▾' : '▸'}</span>` : '';
    row.el.innerHTML =
        `<td>${(f.t - TR.t0).toFixed(4)}</td><td>${delta}</td><td>${row.count}</td>` +
        `<td class="${f.dir === 'tx' ? 'tr-dir-tx' : ''}">${f.dir.toUpperCase()}</td>` +
        `<td class="tr-id">0x${f.id.toString(16).toUpperCase()}${f.ext ? ' (X)' : ''}</td>` +
        `<td class="tr-name ${name ? '' : 'unknown'}">${caretHtml}${name ? escapeHtml(name) : '(unknown)'}</td>` +
        `<td>${f.dlc}</td><td>${traceHexData(f.data, f.dlc)}</td>`;

    if (TR.expandedFixed.has(key) && dbMsg) traceRenderSigTable(row.sigEl, dbMsg, f.data);
}

function traceToggleExpandFixed(key) {
    const row = TR.fixedRows.get(key);
    if (!row || !row.dbMsg) return;
    // Flip the caret glyph immediately — traceFixedUpdate() only redraws it on the
    // next incoming frame, which could be seconds away (or never, once replay ends).
    const caretEl = row.el ? row.el.querySelector('.tr-caret') : null;
    if (TR.expandedFixed.has(key)) {
        TR.expandedFixed.delete(key);
        row.sigEl.style.display = 'none';
        if (caretEl) caretEl.textContent = '▸';
    } else {
        TR.expandedFixed.add(key);
        row.sigEl.style.display = '';
        traceRenderSigTable(row.sigEl, row.dbMsg, row.frame.data);
        if (caretEl) caretEl.textContent = '▾';
    }
}

function traceRenderSigTable(sigTr, dbMsg, data) {
    const rows = traceDecodeFrame(dbMsg, data);
    sigTr.firstChild.innerHTML = `<table class="tr-sig-table">${rows.map(r =>
        `<tr><td class="sn">${escapeHtml(r.name)}${r.mux ? ' <span style="color:var(--accent-purple);">[' + r.mux + ']</span>' : ''}</td>` +
        `<td class="sv">${r.phys}</td><td class="su">${escapeHtml(r.unit)}</td>` +
        `<td>raw ${r.raw}</td><td class="svt">${r.vt ? escapeHtml(r.vt) : ''}</td></tr>`).join('')}</table>`;
}

/* --- Scrolling mode: appended rows, capped, rAF-batched --- */
function traceFlushScroll() {
    const frames = TR.pendingScroll;
    TR.pendingScroll = [];
    if (frames.length === 0) return;
    const body = document.getElementById('trBody');
    const wrap = document.getElementById('trGridWrap');
    const fragment = document.createDocumentFragment();

    frames.forEach(f => {
        const dbMsg = traceLookupMsg(f.id, f.ext);
        const name = dbMsg ? dbMsg.name : null;
        if (!traceRowVisible(f.id, name)) return;
        const key = (f.ext ? 'X' : 'S') + f.id;
        const prev = TR.fixedRows.get(key); // reuse map for per-ID ΔT in scroll mode
        const delta = prev ? ((f.t - prev.lastT) * 1000).toFixed(1) : '—';
        TR.fixedRows.set(key, { lastT: f.t, count: (prev ? prev.count : 0) + 1 });

        const tr = document.createElement('tr');
        tr.className = 'tr-row';
        const caretHtml = dbMsg ? `<span class="tr-caret" title="Show decoded signals">▸</span>` : '';
        tr.innerHTML =
            `<td>${(f.t - TR.t0).toFixed(4)}</td><td>${delta}</td><td></td>` +
            `<td class="${f.dir === 'tx' ? 'tr-dir-tx' : ''}">${f.dir.toUpperCase()}</td>` +
            `<td class="tr-id">0x${f.id.toString(16).toUpperCase()}${f.ext ? ' (X)' : ''}</td>` +
            `<td class="tr-name ${name ? '' : 'unknown'}">${caretHtml}${name ? escapeHtml(name) : '(unknown)'}</td>` +
            `<td>${f.dlc}</td><td>${traceHexData(f.data, f.dlc)}</td>`;
        if (dbMsg) {
            tr.onclick = () => {
                const caretEl = tr.querySelector('.tr-caret');
                if (tr.nextSibling && tr.nextSibling.className === 'tr-sig-row') {
                    tr.nextSibling.remove();
                    if (caretEl) caretEl.textContent = '▸';
                    return;
                }
                const sigTr = document.createElement('tr');
                sigTr.className = 'tr-sig-row';
                sigTr.innerHTML = '<td colspan="8"></td>';
                traceRenderSigTable(sigTr, dbMsg, f.data);
                tr.after(sigTr);
                if (caretEl) caretEl.textContent = '▾';
            };
        }
        fragment.appendChild(tr);
    });
    body.appendChild(fragment);

    while (body.children.length > TR.scrollCap) body.removeChild(body.firstChild);
    if (TR.autoScroll) wrap.scrollTop = wrap.scrollHeight;
}

/* ============================= FOOTER / CONTROLS ============================= */
function traceUpdateFooter() {
    document.getElementById('trTotal').innerText = TR.frameCount;
    document.getElementById('trUnique').innerText = TR.fixedRows.size;
}
setInterval(() => {
    const el = document.getElementById('trRate');
    if (!el) return;
    el.innerText = TR.frameCount - TR.lastRateCount;
    TR.lastRateCount = TR.frameCount;
}, 1000);

function trSourceChanged() {
    TR.source = document.getElementById('trSource').value;
    document.getElementById('trLiveCtl').style.display = TR.source === 'live' ? 'flex' : 'none';
    document.getElementById('trSerialCtl').style.display = TR.source === 'serial' ? 'flex' : 'none';
    document.getElementById('trWifiCtl').style.display = TR.source === 'wifi' ? 'flex' : 'none';
    document.getElementById('trReplayCtl').style.display = TR.source === 'replay' ? 'flex' : 'none';
    document.getElementById('trSeekBarWrap').style.display = (TR.source === 'replay' && TR.replayFrames.length > 0) ? 'flex' : 'none';
}

function trModeChanged() {
    TR.mode = document.getElementById('trMode').value;
    trClear(true);
}

function trClear(keepStats) {
    // Note: TR.expandedFixed is deliberately NOT cleared — expanded signal views
    // persist across Clear and replay restarts, and rows rebuild pre-expanded.
    document.getElementById('trBody').innerHTML = '';
    TR.fixedRows.clear();
    TR.pendingScroll = [];
    if (!keepStats) {
        TR.frameCount = 0; TR.lastRateCount = 0; TR.t0 = null;
        if (typeof plotterOnTraceClear === 'function') plotterOnTraceClear();
    }
    traceUpdateFooter();
}

function trApplyFilter() {
    if (TR.mode !== 'fixed') return; // scroll rows are filtered at insert time
    TR.fixedRows.forEach((row, key) => {
        if (!row.el) return;
        const name = row.dbMsg ? row.dbMsg.name : null;
        const vis = traceRowVisible(row.frame ? row.frame.id : 0, name);
        row.el.style.display = vis ? '' : 'none';
        row.sigEl.style.display = (vis && TR.expandedFixed.has(key)) ? '' : 'none';
    });
}

// Track manual scrolling: pause auto-scroll when the user scrolls up.
document.addEventListener('scroll', (e) => {
    const wrap = document.getElementById('trGridWrap');
    if (e.target !== wrap) return;
    TR.autoScroll = wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight - 40;
}, true);

/* ============================= LIVE SOURCE (WebSocket) ============================= */
function trSetStatus(text, dotClass) {
    document.getElementById('trStatus').innerText = text;
    document.getElementById('trDot').className = 'tr-dot ' + (dotClass || '');
}

function trToggleConnect() {
    if (TR.connected) { trDisconnect(); return; }
    traceRebuildDbMaps();
    const url = document.getElementById('trWsUrl').value.trim();
    trSetStatus('Connecting…', '');
    let ws;
    try { ws = new WebSocket(url); }
    catch (e) { trSetStatus('Invalid URL', 'err'); return; }
    TR.ws = ws;

    ws.onopen = () => {
        ws.send(JSON.stringify({
            cmd: 'config',
            bitrate: parseInt(document.getElementById('trBitrate').value, 10),
            channel: parseInt(document.getElementById('trChannel').value, 10),
            silent: document.getElementById('trSilent').checked
        }));
    };
    ws.onmessage = (ev) => {
        let m;
        try { m = JSON.parse(ev.data); } catch (e) { return; }
        if (m.type === 'frame') {
            traceOnFrame({ t: m.t, id: m.id, ext: !!m.ext, dlc: m.dlc, data: m.data, dir: m.dir || 'rx' });
        } else if (m.type === 'status') {
            TR.connected = true;
            document.getElementById('trConnectBtn').innerText = 'Disconnect';
            trSetStatus(`Connected — ch${m.channel} @ ${m.bitrate / 1000} k${m.silent ? ' (silent)' : ''}`, 'on');
            showToast('Kvaser bridge connected.', 'success');
        } else if (m.type === 'error') {
            trSetStatus('Bridge error: ' + m.message, 'err');
            showToast('Bridge error: ' + m.message, 'error');
        }
    };
    ws.onerror = () => { trSetStatus('Connection failed — is kvaser_bridge.py running?', 'err'); };
    ws.onclose = () => {
        TR.connected = false;
        TR.ws = null;
        document.getElementById('trConnectBtn').innerText = 'Connect';
        trStopAllCyclic();
        if (document.getElementById('trDot').className.indexOf('err') === -1) trSetStatus('Disconnected', '');
    };
}

function trDisconnect() { if (TR.ws) TR.ws.close(); }

function trSendFrame(id, ext, dlc, data) {
    if (TR.source === 'live' && TR.ws && TR.connected) {
        TR.ws.send(JSON.stringify({ cmd: 'tx', id, ext, dlc, data }));
        return true;
    }
    showToast('Transmit requires a live Kvaser connection (the serial source is receive-only).', 'warning');
    return false;
}

/* ============================= REPLAY SOURCE =============================
   Parsing runs in yielded chunks (setTimeout between batches of lines) instead
   of one long synchronous pass, so a big log file (hundreds of thousands of
   lines) reports progress and never freezes the tab while it parses. */
function trParseLogTextAsync(text, fileName, onDone, onProgress) {
    const frames = [];
    const lname = (fileName || '').toLowerCase();
    const isCsv = lname.endsWith('.csv') || text.startsWith('CSV CAN data');
    const lines = text.split('\n');
    const total = lines.length || 1;

    // --- Kvaser Memorator CSV state ---
    // Preamble declares number formats; column header then data rows:
    //   Format of data field,HEX        (or DEC)
    //   Format of id field,HEX          (or DEC)
    //   Time,Channel,id,Flags,DLC,Data0,...,Data7,Counter
    //   0.215340,1,200,268435522,8,01,00,00,00,00,00,00,00,1
    // Flags bits (Kvaser canMSG_*): 0x01 RTR, 0x02 STD, 0x04 EXT,
    //   0x20 ERROR_FRAME, 0x40 TXACK (frame was transmitted by us).
    let idHex = true, dataHex = true, cols = null;

    function processCsvLine(rawLine) {
        const line = rawLine.replace(/\r$/, '').trim();
        if (!line) return;

        let fm = line.match(/^Format of id field\s*,\s*(HEX|DEC)/i);
        if (fm) { idHex = fm[1].toUpperCase() === 'HEX'; return; }
        fm = line.match(/^Format of data field\s*,\s*(HEX|DEC)/i);
        if (fm) { dataHex = fm[1].toUpperCase() === 'HEX'; return; }
        fm = line.match(/^Logging started at\s*,\s*(.+)$/i);
        if (fm) { TR.logStartedAt = fm[1].trim(); return; }

        if (/^Time\s*,\s*Channel\s*,\s*id/i.test(line)) {
            cols = {};
            line.split(',').forEach((h, i) => { cols[h.trim().toLowerCase()] = i; });
            return;
        }
        if (!cols) return; // still in the preamble

        const parts = line.split(',');
        if (parts.length < 5) return;
        const t = parseFloat(parts[cols['time']]);
        if (!Number.isFinite(t)) return;

        const flags = parseInt(parts[cols['flags']], 10) || 0;
        if (flags & 0x20) return;          // error frame — not a data frame
        const ext = (flags & 0x04) !== 0;
        const rtr = (flags & 0x01) !== 0;
        const dir = (flags & 0x40) ? 'tx' : 'rx';

        const id = parseInt(parts[cols['id']], idHex ? 16 : 10);
        if (!Number.isFinite(id)) return;
        const dlc = Math.min(parseInt(parts[cols['dlc']], 10) || 0, 8);

        const data = [];
        if (!rtr) {
            const d0 = cols['data0'] !== undefined ? cols['data0'] : cols['dlc'] + 1;
            for (let b = 0; b < dlc; b++) {
                const v = parseInt(parts[d0 + b], dataHex ? 16 : 10);
                data.push(Number.isFinite(v) ? v & 0xFF : 0);
            }
        }
        frames.push({ t, id, ext, dlc, data, dir });
    }

    // candump: (1632222222.123456) can0 202#1027AABB  /  18FEF100#... (ext by length)
    const reCandump = /^\((\d+\.\d+)\)\s+\S+\s+([0-9A-Fa-f]+)#([0-9A-Fa-f]*)/;
    // Vector .asc: "  0.002000 1  202             Rx   d 8 10 27 00 ..." ; extended IDs end in 'x'
    const reAsc = /^\s*(\d+\.\d+)\s+\d+\s+([0-9A-Fa-f]+)(x)?\s+(Rx|Tx)\s+d\s+(\d+)((?:\s+[0-9A-Fa-f]{1,2})*)/i;
    // PCAN .trc (v1.x style): "     1)      1059.9  Rx     0202  8  10 27 00 ..."
    const reTrc = /^\s*\d+\)\s+([\d.]+)\s+(Rx|Tx)\s+([0-9A-Fa-f]+)\s+(\d+)((?:\s+[0-9A-Fa-f]{1,2})*)/i;

    function processGenericLine(line) {
        let m;
        if ((m = line.match(reCandump))) {
            const idHexStr = m[2];
            const dataHexStr = m[3] || '';
            const data = [];
            for (let i = 0; i < dataHexStr.length; i += 2) data.push(parseInt(dataHexStr.substr(i, 2), 16));
            frames.push({ t: parseFloat(m[1]), id: parseInt(idHexStr, 16), ext: idHexStr.length > 3, dlc: data.length, data, dir: 'rx' });
        } else if ((m = line.match(reAsc))) {
            const data = (m[6] || '').trim().split(/\s+/).filter(Boolean).map(h => parseInt(h, 16));
            frames.push({ t: parseFloat(m[1]), id: parseInt(m[2], 16), ext: !!m[3], dlc: parseInt(m[5], 10), data, dir: m[4].toLowerCase() });
        } else if (lname.endsWith('.trc') && (m = line.match(reTrc))) {
            const data = (m[5] || '').trim().split(/\s+/).filter(Boolean).map(h => parseInt(h, 16));
            const id = parseInt(m[3], 16);
            frames.push({ t: parseFloat(m[1]) / 1000, id, ext: m[3].length > 4 || id > 0x7FF, dlc: parseInt(m[4], 10), data, dir: m[2].toLowerCase() });
        }
    }

    let i = 0;
    function step() {
        const deadline = performance.now() + 30; // yield roughly every 30ms of work
        while (i < lines.length && performance.now() < deadline) {
            if (isCsv) processCsvLine(lines[i]); else processGenericLine(lines[i]);
            i++;
        }
        if (onProgress) onProgress(Math.min(1, i / total));
        if (i < lines.length) {
            setTimeout(step, 0);
        } else {
            frames.sort((a, b) => a.t - b.t);
            onDone(frames);
        }
    }
    step();
}

function trToggleReplay() {
    if (TR.replayState === 'playing') { trPauseReplay(); return; }
    if (TR.replayState === 'paused') { trResumeReplay(); return; }

    // stopped -> load the file and start from the beginning
    const fileEl = document.getElementById('trLogFile');
    const file = fileEl.files[0];
    if (!file) { showToast('Choose a log file first (.asc / .trc / candump .log).', 'error'); return; }
    traceRebuildDbMaps();

    const playBtn = document.getElementById('trPlayBtn');
    const parsingEl = document.getElementById('trParsing');
    playBtn.disabled = true;
    parsingEl.style.display = 'flex';
    document.getElementById('trParsingLabel').innerText = `Parsing ${file.name}… 0%`;
    document.getElementById('trParsingFill').style.width = '0%';
    trSetStatus('Reading file…', '');

    const reader = new FileReader();
    reader.onload = (e) => {
        TR.logStartedAt = null;
        TR.logFileName = file.name;
        trParseLogTextAsync(e.target.result, file.name, (frames) => {
            parsingEl.style.display = 'none';
            playBtn.disabled = false;
            TR.replayFrames = frames;
            if (frames.length === 0) {
                showToast('No frames recognized in this log — unsupported or corrupted format.', 'error');
                trSetStatus('Disconnected', '');
                return;
            }
            trClear();
            if (typeof plotterUpdateMeta === 'function') plotterUpdateMeta();
            TR.replayIdx = 0;
            TR.replayState = 'playing';
            TR.running = true;
            TR.replayWallStart = performance.now();
            TR.replayLogStart = frames[0].t;
            playBtn.innerText = '⏸ Pause';
            document.getElementById('trSeekBarWrap').style.display = 'flex';
            trUpdateSeekBar();
            trSetStatus(`Replaying ${frames.length} frames from ${file.name}`, 'on');
            trReplayStep();
        }, (frac) => {
            const pct = (frac * 100).toFixed(0);
            document.getElementById('trParsingFill').style.width = pct + '%';
            document.getElementById('trParsingLabel').innerText = `Parsing ${file.name}… ${pct}%`;
        });
    };
    reader.onerror = () => {
        parsingEl.style.display = 'none';
        playBtn.disabled = false;
        showToast('Could not read the log file from disk.', 'error');
    };
    reader.readAsText(file);
}

function trPauseReplay() {
    TR.replayState = 'paused';
    TR.running = false;
    clearTimeout(TR.replayTimer);
    TR.replayPausedAt = performance.now();
    document.getElementById('trPlayBtn').innerText = '▶ Resume';
    trSetStatus(`Replay paused — frame ${TR.replayIdx} / ${TR.replayFrames.length}`, '');
    trUpdateSeekBar();
}

function trResumeReplay() {
    // Shift the wall-clock start by the paused duration so the log-time position
    // is exactly where it was — playback continues from the pause point.
    TR.replayWallStart += performance.now() - TR.replayPausedAt;
    TR.replayState = 'playing';
    TR.running = true;
    document.getElementById('trPlayBtn').innerText = '⏸ Pause';
    trSetStatus(`Replaying — frame ${TR.replayIdx} / ${TR.replayFrames.length}`, 'on');
    trReplayStep();
}

function trReplayStep() {
    if (!TR.running) return;
    const speed = parseFloat(document.getElementById('trSpeed').value);
    const batchDeadline = performance.now() + 8; // stay responsive

    const elapsedLog = ((performance.now() - TR.replayWallStart) / 1000) * speed;
    while (TR.replayIdx < TR.replayFrames.length &&
           TR.replayFrames[TR.replayIdx].t - TR.replayLogStart <= elapsedLog &&
           performance.now() < batchDeadline) {
        traceOnFrame(TR.replayFrames[TR.replayIdx++]);
    }
    trUpdateSeekBar();
    if (TR.replayIdx >= TR.replayFrames.length) {
        TR.replayState = 'stopped';
        TR.running = false;
        document.getElementById('trPlayBtn').innerText = '▶ Play';
        trSetStatus('Replay finished', '');
        return;
    }
    TR.replayTimer = setTimeout(trReplayStep, 10);
}

/* ---- Seek bar: scrub the replay forward/back without re-streaming every
   frame through the DOM (which is what caused big logs to freeze on seek). ---- */
function trTotalDuration() {
    if (!TR.replayFrames.length) return 0;
    return TR.replayFrames[TR.replayFrames.length - 1].t - TR.replayFrames[0].t;
}

function trCurrentReplayTime() {
    if (!TR.replayFrames.length) return 0;
    const idx = Math.min(TR.replayIdx, TR.replayFrames.length - 1);
    return TR.replayFrames[idx].t - TR.replayFrames[0].t;
}

function trUpdateSeekBar() {
    if (TR.seeking) return;
    const bar = document.getElementById('trSeekBar');
    const label = document.getElementById('trSeekLabel');
    if (!bar || !label) return;
    const dur = trTotalDuration();
    const cur = trCurrentReplayTime();
    bar.value = dur > 0 ? Math.round((cur / dur) * 1000) : 0;
    label.innerText = `${cur.toFixed(1)}s / ${dur.toFixed(1)}s`;
}

// Fires continuously while dragging: just move the time label, don't seek yet
// (seeking on every pixel of drag would repeatedly rescan the whole frame list).
function trSeekInput() {
    TR.seeking = true;
    const dur = trTotalDuration();
    const t = (document.getElementById('trSeekBar').value / 1000) * dur;
    document.getElementById('trSeekLabel').innerText = `${t.toFixed(1)}s / ${dur.toFixed(1)}s`;
}

// Fires once the user releases the slider (or clicks/arrows it) — commits the seek.
function trSeekCommit() {
    TR.seeking = false;
    if (!TR.replayFrames.length) return;
    const dur = trTotalDuration();
    const bar = document.getElementById('trSeekBar').value;
    trSeekToTime(TR.replayFrames[0].t + (bar / 1000) * dur);
}

function trSeekStep(deltaSeconds) {
    if (!TR.replayFrames.length) return;
    trSeekToTime(TR.replayFrames[0].t + trCurrentReplayTime() + deltaSeconds);
}

function trSeekToTime(targetT) {
    const frames = TR.replayFrames;
    if (!frames.length) return;
    clearTimeout(TR.replayTimer);
    const wasPlaying = TR.replayState === 'playing';
    TR.running = false;

    const clamped = Math.max(frames[0].t, Math.min(targetT, frames[frames.length - 1].t));
    let lo = 0, hi = frames.length - 1;
    while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (frames[mid].t < clamped) lo = mid + 1; else hi = mid;
    }
    const targetIdx = lo;

    trClear();
    TR.t0 = frames[0].t;
    TR.frameCount = targetIdx;

    // Reconstruct on-screen state at the seek point from just the LATEST frame
    // per CAN ID up to targetIdx — one DOM row write per unique ID, not one per
    // frame, so scrubbing to the middle of a multi-million-frame log is instant.
    if (targetIdx > 0) {
        const latestByKey = new Map();
        for (let i = 0; i < targetIdx; i++) {
            const f = frames[i];
            latestByKey.set((f.ext ? 'X' : 'S') + f.id, f);
        }
        if (TR.mode === 'fixed') latestByKey.forEach(f => traceFixedUpdate(f));
        if (typeof plotterOnFrame === 'function') {
            for (let i = 0; i < targetIdx; i++) plotterOnFrame(frames[i]);
        }
    }
    traceUpdateFooter();

    TR.replayIdx = targetIdx;
    TR.replayLogStart = frames[0].t;
    const speed = parseFloat(document.getElementById('trSpeed').value);
    TR.replayWallStart = performance.now() - ((clamped - TR.replayLogStart) / speed) * 1000;
    trUpdateSeekBar();

    if (wasPlaying) {
        TR.replayState = 'playing';
        TR.running = true;
        document.getElementById('trPlayBtn').innerText = '⏸ Pause';
        trSetStatus(`Replaying — frame ${TR.replayIdx} / ${frames.length}`, 'on');
        trReplayStep();
    } else {
        TR.replayState = 'paused';
        TR.replayPausedAt = performance.now();
        document.getElementById('trPlayBtn').innerText = '▶ Resume';
        trSetStatus(`Replay paused — frame ${TR.replayIdx} / ${frames.length}`, '');
    }
}

// Picking a different log file resets the state machine so the next press of
// the button starts the new file from the beginning.
function trReplayFileChanged() {
    clearTimeout(TR.replayTimer);
    TR.replayState = 'stopped';
    TR.running = false;
    TR.replayIdx = 0;
    TR.replayFrames = [];
    const btn = document.getElementById('trPlayBtn');
    if (btn) btn.innerText = '▶ Play';
    document.getElementById('trSeekBarWrap').style.display = 'none';
    trSetStatus('Log file selected — press Play', '');
}

/* ============================= TRANSMIT PANEL ============================= */
function trToggleTx() {
    const body = document.getElementById('trTxBody');
    body.classList.toggle('open');
    document.getElementById('trTxCaret').innerText = body.classList.contains('open') ? '▼' : '▲';
    if (body.classList.contains('open')) trTxPopulateMsgList();
}

let trTxMsgs = []; // flat [{ fileName, msg }] snapshot across all loaded DBCs

function trTxPopulateMsgList() {
    const sel = document.getElementById('trTxMsg');
    if (!sel) return;
    const prevLabel = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text : null;
    const entries = (typeof allDbEntries === 'function') ? allDbEntries() : [{ name: '', db }];
    const multi = entries.length > 1;
    trTxMsgs = [];
    entries.forEach(e => e.db.messages.forEach(m => { if (!m.isIndependent) trTxMsgs.push({ fileName: e.name, msg: m }); }));
    sel.innerHTML = trTxMsgs.map((x, i) => {
        const label = `${multi ? x.fileName + ' :: ' : ''}${x.msg.name} (0x${x.msg.id.toString(16).toUpperCase()})`;
        return `<option value="${i}">${escapeHtml(label)}</option>`;
    }).join('');
    if (prevLabel) {
        const match = [...sel.options].find(o => o.text === prevLabel);
        if (match) sel.value = match.value;
    }
    trTxMsgChanged();
}

function trTxCurrentMsg() {
    const sel = document.getElementById('trTxMsg');
    const x = trTxMsgs[parseInt(sel.value, 10)];
    return x ? x.msg : null;
}

function trTxMsgChanged() {
    const msg = trTxCurrentMsg();
    const grid = document.getElementById('trTxSignals');
    if (!msg) { grid.innerHTML = ''; document.getElementById('trTxPreview').innerText = '—'; return; }

    // Default period from GenMsgCycleTime, default values from GenSigStartValue (raw -> phys).
    const cyc = effectiveAttr(msg.attrs, 'GenMsgCycleTime');
    if (cyc !== undefined && cyc > 0) document.getElementById('trTxPeriod').value = cyc;

    grid.innerHTML = msg.signals.map((sig, i) => {
        const sv = effectiveAttr(sig.attrs, 'GenSigStartValue');
        const physDefault = (sv !== undefined ? sv : 0) * parseFloat(sig.factor) + parseFloat(sig.offset);
        const muxTag = sig.muxType === 'M' ? ' [M]' : (sig.muxType === 'm' ? ` [m${sig.muxValue}]` : '');
        return `<div class="fg"><label>${escapeHtml(sig.name)}${muxTag} ${sig.unit ? '(' + escapeHtml(sig.unit) + ')' : ''}</label>
                <input type="number" step="any" data-sig="${i}" value="${Number.isInteger(physDefault) ? physDefault : +physDefault.toFixed(4)}" oninput="trTxUpdatePreview()"></div>`;
    }).join('');
    trTxUpdatePreview();
}

function trTxCollect() {
    const msg = trTxCurrentMsg();
    if (!msg) return null;
    const physByName = {};
    document.querySelectorAll('#trTxSignals input[data-sig]').forEach(inp => {
        const sig = msg.signals[parseInt(inp.dataset.sig, 10)];
        const v = parseFloat(inp.value);
        if (sig && Number.isFinite(v)) physByName[sig.name] = v;
    });
    return { msg, data: traceEncodeFrame(msg, physByName) };
}

function trTxUpdatePreview() {
    const c = trTxCollect();
    document.getElementById('trTxPreview').innerText = c ? traceHexData(c.data, c.msg.dlc) : '—';
}

function trTxOnce() {
    const c = trTxCollect();
    if (!c) return;
    if (trSendFrame(c.msg.id, c.msg.isExt, c.msg.dlc, c.data)) showToast(`Sent ${c.msg.name}.`, 'success');
}

function trTxCyclicToggle() {
    const btn = document.getElementById('trTxCyclicBtn');
    const c = trTxCollect();
    if (!c) return;
    const key = c.msg.name;
    if (TR.txTimers.has(key)) {
        clearInterval(TR.txTimers.get(key));
        TR.txTimers.delete(key);
        btn.innerText = '▶ Start Cyclic';
        showToast(`Cyclic TX of ${key} stopped.`, 'success');
        return;
    }
    const period = Math.max(1, parseInt(document.getElementById('trTxPeriod').value, 10) || 100);
    if (!TR.connected) { showToast('Connect to the Kvaser bridge first.', 'warning'); return; }
    const timer = setInterval(() => {
        const cc = trTxCollect(); // re-collect so live edits take effect
        if (cc) trSendFrame(cc.msg.id, cc.msg.isExt, cc.msg.dlc, cc.data);
    }, period);
    TR.txTimers.set(key, timer);
    btn.innerText = '⏹ Stop Cyclic';
    showToast(`Cyclic TX of ${key} every ${period} ms.`, 'success');
}

function trStopAllCyclic() {
    TR.txTimers.forEach(t => clearInterval(t));
    TR.txTimers.clear();
    const btn = document.getElementById('trTxCyclicBtn');
    if (btn) btn.innerText = '▶ Start Cyclic';
}
